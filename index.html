<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>연재</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

:root{
  --bg:#f7f5ef; --bg2:#ffffff; --bg3:#f1eee5; --bg4:#e9e4d6; --bg0:#e2dbc8;
  --border:#ddd5c2; --border2:#e6e0d1; --borderdark:#d3cbb6;
  --text:#2b2620; --text-dim:#4d4433; --text-dim2:#3f382a; --text-mut:#6b5f47;
  --text-faint:#8c8168; --text-faint2:#a49877; --text-faint3:#8c8168; --text-faint4:#7a6f56;
  --accent:#a8823f; --accent-text:#ffffff;
  --danger:#c1453a; --danger-text:#fff;
  --hashtag:#1d6fc9;
  --im-blue:#0b84ff; --im-gray:#e5e5ea; --im-gray-text:#1c1c1e;
}

*{box-sizing:border-box; margin:0; padding:0; touch-action:manipulation; -webkit-tap-highlight-color:transparent; letter-spacing:-0.02em;}
html,body{width:100%; height:100%; overflow-x:hidden; overflow-y:auto;}
body{
  background:var(--bg); color:var(--text); font-family:'Pretendard',sans-serif;
  min-height:100vh; min-height:100dvh; overscroll-behavior-y:auto;
  transition:background .2s,color .2s;
}
h1{font-weight:700;}
.mono{font-family:'Pretendard',sans-serif; font-weight:600;}
button, input, textarea{font-family:inherit;}
.hashtag{color:var(--hashtag);}

#topbar{position:sticky; top:0; z-index:20; background:var(--bg2); border-bottom:1px solid var(--border); padding:10px 12px 8px;}
#topbar .titlerow{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; gap:8px;}
#topbar h1{font-family:'Pretendard',sans-serif; font-weight:800; font-size:14px; color:var(--accent); cursor:pointer;}
.topbtns{display:flex; gap:6px; flex:0 0 auto;}
#charBtn, #fabLock{background:none; border:1px solid var(--border); color:var(--text-dim); border-radius:16px; padding:5px 10px; font-size:12.5px;}
#folderRow{display:flex; gap:6px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:2px;}
#folderRow::-webkit-scrollbar{display:none;}
.chip{
  flex:0 0 auto; font-size:13px; padding:7px 13px; border-radius:16px; background:var(--bg4);
  color:var(--text-dim); white-space:nowrap; border:1px solid var(--border);
}
.chip.active{background:var(--accent); color:var(--accent-text); font-weight:700; border-color:var(--accent);}
.chip.add{background:none; border:1px dashed var(--text-faint3); color:var(--accent);}
.chipwrap{display:flex; flex:0 0 auto;}
.chipwrap .chip{border-radius:16px 0 0 16px;}
.chipedit{flex:0 0 auto; font-size:11px; padding:7px 9px; border-radius:0 16px 16px 0; background:var(--bg4); color:var(--text-faint4); border:1px solid var(--border); border-left:1px solid var(--borderdark);}
.chipwrap .chip.active + .chipedit{background:var(--accent); color:var(--accent-text); border-color:var(--accent);}

#main{padding:18px 22px 80px; max-width:640px; margin:0 auto;}
#editor{min-height:78vh; outline:none; font-size:18.5px; line-height:1.95; word-break:break-word;}
#editor:empty:before{content:attr(data-ph); color:var(--text-faint3);}
#editor img{max-width:100%; border-radius:10px; display:block; margin:12px 0;}
#editor .imgs img, #editor .igimgs img{margin:0;}
#empty{text-align:center; color:var(--text-faint2); font-size:13px; margin-top:60px;}

.embed{position:relative; margin:9px 0; width:100%;}
.embed.block.imessage{margin:2px 0;}
.embed .embed-del{position:absolute; top:-8px; right:-8px; width:22px; height:22px; border-radius:50%; background:var(--danger); color:var(--danger-text); border:none; font-size:12px; line-height:22px; opacity:0; transition:opacity .15s; z-index:2;}
.embed:hover .embed-del{opacity:1;}

#editor hr.divider{border:none; border-top:1px solid var(--border); margin:26px auto; width:35%; min-width:80px; max-width:220px;}
.imgs{display:grid; gap:3px; border-radius:10px; overflow:hidden; margin:8px 0;}
.imgs img{width:100%; object-fit:cover; display:block; margin:0; cursor:zoom-in;}
.imgs.n1 img{height:auto; object-fit:initial;}
.imgs.n2{grid-template-columns:1fr 1fr;} .imgs.n2 img{aspect-ratio:1/1; height:auto;}
.imgs.n3{grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr;}
.imgs.n3 img:nth-child(1){grid-column:1; grid-row:1; aspect-ratio:1/1; height:auto;}
.imgs.n3 img:nth-child(2){grid-column:1; grid-row:2; aspect-ratio:1/1; height:auto;}
.imgs.n3 img:nth-child(3){grid-column:2; grid-row:1/3; height:100%;}
.imgs.n4plus{grid-template-columns:1fr 1fr;} .imgs.n4plus img{aspect-ratio:1/1; height:auto;}

#overlay, #charOverlay, #blockSheet, #profileChapterOverlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:40; align-items:flex-end;}
#overlay .sheet, #charOverlay .sheet, #blockSheet .sheet, #profileChapterOverlay .sheet{background:var(--bg2); width:100%; padding:18px 16px calc(18px + env(safe-area-inset-bottom)); border-radius:16px 16px 0 0; max-height:85vh; overflow-y:auto;}
#blockSheet{align-items:flex-start;}
#blockSheet .sheet{border-radius:0 0 16px 16px; padding:18px 16px;}
#overlay input, #charOverlay input, #blockSheet textarea, #profileChapterOverlay input, #profileChapterOverlay textarea{width:100%; background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:11px; border-radius:10px; font-size:15px; margin:10px 0;}
#blockSheet textarea{min-height:70px; resize:vertical; line-height:1.6;}
#overlay .row, #charOverlay .row, #blockSheet .row, #profileChapterOverlay .row{display:flex; gap:8px;}
#overlay button, #charOverlay button, #blockSheet button, #profileChapterOverlay button{padding:11px; border-radius:10px; border:none; font-size:14px;}
#overlay .row button, #charOverlay .row button, #blockSheet .row button, #profileChapterOverlay .row button{flex:1;}
#overlay .cancel, #charOverlay .cancel, #blockSheet .cancel, #profileChapterOverlay .cancel{background:var(--bg4); color:var(--text-dim2);}
#overlay .ok, #charOverlay .ok, #blockSheet .ok, #profileChapterOverlay .ok{background:var(--accent); color:var(--accent-text); font-weight:700;}
#profCatFilter{display:none;}
#profCatFilter.show{display:flex;}
#editor[data-pf="idol"] .block.profile:not([data-category="idol"]){display:none;}
#editor[data-pf="fan"] .block.profile:not([data-category="fan"]){display:none;}
#editor[data-pf="other"] .block.profile:not([data-category="other"]){display:none;}
.cat-btn{flex:1; padding:9px 0; border-radius:10px; background:var(--bg4); color:var(--text-mut); border:1px solid var(--border); font-size:13px; font-weight:600;}
.cat-btn.active{background:var(--accent); color:var(--accent-text); border-color:var(--accent);}
#charList{margin-top:12px; border-top:1px solid var(--border2); padding-top:10px; display:flex; flex-direction:column; gap:6px;}
.charRowItem{display:flex; align-items:center; gap:8px; padding:8px 10px; background:var(--bg3); border-radius:10px;}
.charRowItem .ci-av{width:28px; height:28px; border-radius:50%; background:var(--accent); flex:0 0 auto;}
.charRowItem .ci-info{flex:1; min-width:0;}
.charRowItem .ci-name{font-size:13.5px; font-weight:700;}
.charRowItem .ci-handles{font-size:11px; color:var(--text-faint);}
.charRowItem button{background:none; border:none; color:var(--text-faint3); font-size:12px; padding:4px 6px;}
.charRowItem .ci-ord{display:flex; flex-direction:column; gap:0;}
.charRowItem .ci-ord button{padding:0 4px; font-size:10px; line-height:1.4;}
.charSection{font-size:11px; font-weight:700; color:var(--text-faint2); margin:14px 0 2px; letter-spacing:.02em;}
.charRow2{display:flex; gap:8px; align-items:center; margin:6px 0;}
.charRow2 label{display:flex; align-items:center; gap:4px; font-size:12px; color:var(--text-dim); white-space:nowrap;}
.pillrow{display:flex; gap:6px; flex-wrap:wrap; margin:6px 0;}
.charrow{display:flex; gap:6px; flex-wrap:wrap; margin:8px 0; padding:8px; background:var(--bg0); border-radius:10px;}
.pillrow button{flex:1 1 18%; font-size:11px; padding:7px 0; border-radius:8px; background:var(--bg4); color:var(--text-mut); border:none;}
.pillrow button.active{background:var(--danger); color:var(--danger-text); font-weight:700;}
#blockPreview{display:flex; gap:6px; overflow-x:auto; margin:6px 0;}
#blockPreview .thumb{position:relative; flex:0 0 auto;}
#blockPreview img{width:52px; height:52px; object-fit:cover; border-radius:8px;}
#blockPreview .rm{position:absolute; top:-5px; right:-5px; background:var(--danger); color:var(--danger-text); border-radius:50%; width:18px; height:18px; font-size:11px; border:none; line-height:18px;}
.attachbtn{background:none; border:1px solid var(--border); color:var(--text-dim); padding:7px 12px; border-radius:8px; font-size:12.5px; display:inline-block; margin-top:2px;}
#communityCommentRow{display:flex; gap:6px; align-items:center; margin:8px 0 0;}
#communityCommentRow input{flex:1; margin:0;}
#communityCommentRow button{flex:0 0 auto; background:var(--bg4); color:var(--text-dim); padding:9px 13px;}
#communityCommentList{display:flex; flex-direction:column; gap:5px; margin:8px 0 0;}
#communityCommentList .ccItem{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-mut); background:var(--bg4); padding:6px 10px; border-radius:8px;}
#communityCommentList .ccItem span{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
#communityCommentList .ccItem button{background:none; border:none; color:var(--danger); font-size:13px; padding:2px 4px;}

#editBtns{display:none; gap:6px;}
#editBtns button{background:none; border:1px solid var(--border); color:var(--text-dim); border-radius:16px; padding:5px 10px; font-size:13px;}

#lightbox{display:none; position:fixed; inset:0; background:rgba(0,0,0,.94); z-index:50; align-items:center; justify-content:center;}
#lightbox img{max-width:94vw; max-height:94vh; object-fit:contain;}
.inline-editing{outline:2px dashed var(--accent) !important; outline-offset:3px; border-radius:6px;}
.spin-box{position:relative; border:2px solid #e0233c; border-radius:4px; padding:18px 14px 14px; margin:10px 0 4px; background:#fff;}
.spin-label{position:absolute; top:-11px; right:10px; background:#fff; padding:0 6px; color:#e0233c; font-weight:800; font-style:italic; font-size:13px;}
.spin-text{font-size:15px; line-height:1.6; text-align:center; font-weight:600; color:#222;}
.spin-source{font-size:11px; color:var(--text-faint); margin:3px 0 4px;}
#imgEditMenu{display:none; position:fixed; z-index:60; background:var(--bg2); border:1px solid var(--border); border-radius:10px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,.4);}
#imgEditMenu button{display:block; width:100%; padding:10px 18px; background:none; border:none; color:var(--text); font-size:13px; white-space:nowrap; text-align:left;}
#imgEditMenu button.danger{color:var(--danger);}
.chip.locked{opacity:.6;}
.chip.locked::after{content:" 🔒";}
body.folder-locked #editor{pointer-events:none;}
body.folder-locked #editBtns{display:none !important;}

.block.instagram{padding:0; overflow:hidden; border:1px solid var(--border2); border-radius:12px; background:var(--bg3);}
.block.instagram .ighead{display:flex; align-items:center; gap:8px; padding:10px 12px;}
.block.instagram .av{width:30px; height:30px; border-radius:50%; background:linear-gradient(45deg,#feda75,#d62976,#4f5bd5); background-size:cover; background-position:center; flex:0 0 auto;}
.block.instagram .uname{font-weight:700; font-size:15px; color:var(--text);}
.block.instagram .igimgs{display:flex; overflow-x:auto; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; position:relative;}
.block.instagram .igimgs::-webkit-scrollbar{display:none;}
.block.instagram .igimgs img{width:100%; flex:0 0 100%; scroll-snap-align:start; display:block; aspect-ratio:5/6; object-fit:cover; margin:0; cursor:zoom-in;}
.block.instagram .igimgwrap{position:relative; width:100%;}
.block.instagram .ignav{position:absolute; top:50%; transform:translateY(-50%); width:26px; height:26px; border-radius:50%; background:rgba(0,0,0,.45); color:#fff; border:none; font-size:13px; z-index:3; display:flex; align-items:center; justify-content:center;}
.block.instagram .ignav.prev{left:8px;} .block.instagram .ignav.next{right:8px;}
.block.instagram .igfoot{display:flex; gap:14px; padding:10px 12px 0;}
.block.instagram .igfoot svg{width:23px; height:23px; stroke:var(--text); fill:none; stroke-width:1.8;}
.block.instagram .igbody{padding:6px 12px 12px;}
.block.instagram .igtext{font-size:16px; line-height:1.55; white-space:pre-wrap;}
.block.instagram .igtext b{margin-right:6px;}

.block.twitter{display:flex; flex-direction:column; padding:12px 14px; border:1px solid var(--border2); border-radius:12px; background:var(--bg3);}
.block.twitter .tw-entry{display:flex; gap:10px;}
.block.twitter .tw-reply{margin-top:10px; position:relative;}
.block.twitter .tw-reply::before{content:"";position:absolute; left:19px; top:-10px; bottom:0; width:2px; background:var(--border2); z-index:0;}
.block.twitter .av{width:38px; height:38px; border-radius:50%; background:#1d9bf0; background-size:cover; background-position:center; flex:0 0 auto; position:relative; z-index:1;}
.block.twitter .tw-reply .av{width:38px; height:38px;}
.block.twitter .twbody{flex:1; min-width:0;}
.block.twitter .twhead{font-size:16px;}
.block.twitter .twhead b{color:var(--text);}
.block.twitter .verified{display:inline-block; width:15px; height:15px; vertical-align:middle; margin-left:2px;}
.block.twitter .twhead span{color:var(--text-faint); margin-left:4px;}
.block.twitter .twtext{font-size:18px; line-height:1.5; margin:3px 0 4px; white-space:pre-wrap;}
.block.twitter .imgs{border-radius:14px; border:1px solid var(--border2); margin-top:4px; overflow:hidden;}
.block.twitter .imgs.n4plus{gap:1px; border:none;}

.block.community{padding:14px 14px 12px; border:1px solid var(--border2); border-radius:10px; background:var(--bg3);}
.block.community .cm-badge{display:inline-block; font-size:10.5px; font-weight:800; padding:2px 8px; border-radius:4px; margin-bottom:8px; color:#fff;}
.block.community.site-instiz .cm-badge{background:#00b3a4;}
.block.community.site-theqoo .cm-badge{background:#c0392b;}
.block.community.site-jjookbbang .cm-badge{background:#ff5da2;}
.block.community .cm-title{font-size:17.5px; font-weight:800; margin-bottom:6px; color:var(--text); line-height:1.4;}
.block.community .cm-meta{font-size:13px; font-weight:700; margin-bottom:9px;}
.block.community.site-instiz .cm-meta{color:#00998c;}
.block.community.site-theqoo .cm-meta{color:#c0392b;}
.block.community.site-jjookbbang .cm-meta{color:#ff5da2;}
.block.community .cm-body{font-size:16px; line-height:1.65; white-space:pre-wrap; color:var(--text-dim); word-break:break-word;}
.block.community .cm-body .imgs{margin-top:8px;}
.block.community .cm-comments{margin-top:12px; padding-top:10px; border-top:1px solid var(--border2); display:flex; flex-direction:column; gap:8px;}
.block.community .cm-comment{font-size:14.5px; line-height:1.55; color:var(--text-dim2); white-space:pre-wrap; word-break:break-word;}
.block.community .cm-comment b{margin-right:6px; font-weight:800;}
.block.community .cm-reply{margin:6px 0 0 16px; padding-left:10px; border-left:2px solid var(--border2);}
#communityCommentList .ccItem, #blockThreadPreview .tpItem{cursor:pointer; border:1px solid transparent;}
#communityCommentList .ccItem.sel, #blockThreadPreview .tpItem.sel{border-color:var(--accent); background:var(--bg3);}
.block.community.site-instiz .cm-comment b{color:#00998c;}
.block.community.site-theqoo .cm-comment b{color:#c0392b;}
.block.community.site-jjookbbang .cm-comment b{color:#ff5da2;}

.block.article{padding:14px; border:1px solid var(--border2); border-radius:10px; background:var(--bg3);}
.block.article .art-site{font-size:11.5px; font-weight:800; color:var(--accent); margin-bottom:6px;}
.block.article .art-title{font-size:19px; font-weight:800; line-height:1.4; margin-bottom:8px; color:var(--text);}
.block.article .art-reporter{font-size:13px; color:var(--text-faint); margin-bottom:10px;}
.block.article .art-body{font-size:16px; line-height:1.65; color:var(--text-dim); white-space:pre-wrap; word-break:break-word;}
.block.article .art-body .imgs{margin-top:8px;}
.block.profile{padding:0 0 16px; position:relative;}
.block.profile .prof-photo{width:100%; border-radius:12px 12px 0 0; overflow:hidden; background:var(--bg4); cursor:pointer;}
.block.profile .prof-photo img{width:100%; height:auto; display:block;}
.block.profile .prof-photo-add{width:100%; padding:26px 0; text-align:center; font-size:13px; color:var(--text-faint3); background:var(--bg3); border-radius:12px 12px 0 0; cursor:pointer;}
.block.profile .prof-edit-btn{position:absolute; top:8px; right:8px; width:24px; height:24px; border-radius:50%; background:rgba(0,0,0,.45); color:#fff; border:none; font-size:12px; line-height:24px; z-index:2;}
.block.profile .prof-head{padding:16px 16px 0;}
.block.profile .prof-name{font-size:19px; font-weight:800; color:var(--text); margin-bottom:2px; cursor:text;}
.block.profile .prof-rows{display:flex; flex-direction:column; gap:6px; border-top:1px solid var(--border); padding:10px 16px 0; margin:0 16px;}
.block.profile .prof-row{display:flex; gap:8px; font-size:13.5px;}
.block.profile .prof-k{color:var(--text-faint); flex-shrink:0; width:90px; white-space:nowrap;}
.block.profile .prof-v{color:var(--text-dim); flex:1; min-width:0; word-break:break-word; white-space:pre-wrap; cursor:text;}

.bubblerow{display:flex; align-items:flex-end; gap:6px;}
.bubblerow.right{flex-direction:row-reverse;}
.bubblecol{display:flex; flex-direction:column; max-width:78%;}
.bubblerow.right .bubblecol{align-items:flex-end;}
.b-name{font-size:11px; color:var(--text-faint); margin-bottom:3px;}
.bubble{padding:9px 13px; border-radius:16px; font-size:16.5px; line-height:1.45; white-space:pre-wrap; word-break:break-word;}
.block.imessage .bubblerow:not(.right) .bubble{background:var(--im-gray); color:var(--im-gray-text); border-bottom-left-radius:4px;}
.block.imessage .bubblerow.right .bubble{background:var(--im-blue); color:#fff; border-bottom-right-radius:4px;}
.bubble .imgs{margin-top:4px; border-radius:12px;}

@media (hover:hover) and (pointer:fine){
  .chip, #charBtn, .chipedit, #editBtns button, .embed-del{cursor:pointer; transition:background .15s,opacity .15s;}
  .chip:hover:not(.active){background:var(--border2);}
  #editor img{cursor:zoom-in;}
}
@media (min-width:860px){
  #topbar{padding:14px 24px 10px;}
  #main{max-width:720px; padding:22px 24px 120px;}
}
@media (max-width:400px){
  #topbar h1{font-size:13px;}
  #charBtn{font-size:12px; padding:4px 8px;}
  .chip{font-size:12px; padding:6px 11px;}
  #editor{font-size:15px;}
}
@supports (-webkit-touch-callout:none){
  #editor, #overlay input, #charOverlay input, #blockSheet textarea, #profileChapterOverlay input, #profileChapterOverlay textarea{font-size:16px;} /* iOS 자동 확대 방지 */
}
</style>
</head>
<body>
<div id="topbar">
  <div class="titlerow">
    <h1 id="siteTitle">📖 연재소설</h1>
    <div class="topbtns">
      <span id="editBtns">
        <button id="fabUndo" title="뒤로가기">↩︎</button>
        <button id="fabRedo" title="앞으로가기">↪︎</button>
        <button id="fabDivider" title="구분선 삽입">―</button>
        <button id="fabBlock" title="대화/SNS 삽입">💬</button>
      </span>
      <button id="fabLock" title="회차 잠금" style="display:none">🔓</button>
      <button id="charBtn">👤 인물</button>
    </div>
  </div>
  <div id="folderRow"></div>
</div>

<div id="main">
  <div id="profCatFilter" style="display:none;gap:6px;margin-bottom:10px">
    <button type="button" class="cat-btn active" data-pf="idol">아이돌</button>
    <button type="button" class="cat-btn" data-pf="fan">팬</button>
    <button type="button" class="cat-btn" data-pf="other">그외</button>
  </div>
  <div id="editor" contenteditable="true" spellcheck="false" data-ph="이어서 써내려가세요..." style="display:none"></div>
  <div id="empty">회차를 선택하거나 새로 만들어보세요</div>
</div>

<div id="overlay">
  <div class="sheet">
    <div class="mono" style="font-size:13px;color:var(--accent)" id="folderSheetTitle">새 회차</div>
    <input id="folderNumInput" type="number" placeholder="회차 번호 (예: 1)">
    <input id="folderNameInput" placeholder="회차 제목">
    <div class="row">
      <button class="cancel" id="folderCancel">취소</button>
      <button class="cancel" id="folderDelete" style="display:none;background:var(--danger);color:var(--danger-text)">삭제</button>
      <button class="ok" id="folderOk">만들기</button>
    </div>
  </div>
</div>

<div id="profileChapterOverlay">
  <div class="sheet">
    <div class="mono" style="font-size:13px;color:var(--accent)">인물소개 추가</div>
    <div class="row" id="profileCatRow" style="gap:6px;margin:10px 0">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, deleteDoc, updateDoc, doc,
  query, orderBy, onSnapshot, where, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const CLOUDINARY_CLOUD = 'dbljkloal';
const CLOUDINARY_PRESET = 'Everything';

const firebaseConfig = {
  apiKey: "AIzaSyDdHBd1HFYnoMdQQWbMogwrtxKYUO4dcVY",
  authDomain: "promotion-de29c.firebaseapp.com",
  projectId: "promotion-de29c",
  storageBucket: "promotion-de29c.firebasestorage.app",
  messagingSenderId: "855775584555",
  appId: "1:855775584555:web:66aa308ad010873c1ee56e"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const foldersCol = collection(db, "chapters");
const charactersCol = collection(db, "characters");

let currentFolder = null, editingFolderId = null, editingCharId = null;
let charactersMap = {};
let chapterUnsub = null;
let chaptersArr = [];
let savedRange = null;
let saveTimer = null;
let blockType = "twitter", blockCharId = null, blockTwAccount = "public", blockPosition = "left", blockPending = [], blockThread = [], blockReplyTarget = null, blockIdSeq = 1;
let profilePhotoFile = null;
let editingProfileCard = null;
let profileCategory = "fan";
let charTwAvatarFile = null, charTwAvatarExisting = "";
let charTwPrivAvatarFile = null, charTwPrivAvatarExisting = "";
let charIgAvatarFile = null, charIgAvatarExisting = "";
let communitySite = "instiz", communityComments = [], communityReplyTarget = null, communityIdSeq = 1;
let folderLocked = false;
let currentProfCat = "idol"; // 인물소개 폴더 안에서 보고 있는 카테고리(파일)
let currentIsProf = false;
let profDataCache = null; // 현재 인물소개 회차의 firestore 데이터 캐시
let history = [], historyIndex = -1, historySuppress = false;
let pressTimer = null, pressImg = null;

const NEEDS_CHAR = new Set(["instagram", "twitter", "imessage"]);
const NEEDS_POS = new Set(["imessage"]);
const COMMUNITY_META = {
  instiz: { label: "인스티즈", nick: "익인" },
  theqoo: { label: "더쿠", nick: "무명의 더쿠" },
  jjookbbang: { label: "쭉빵", nick: "JB" }
};

const editor = document.getElementById("editor");
const emptyEl = document.getElementById("empty");
const fab = document.getElementById("editBtns");

// site title
const siteTitle = document.getElementById("siteTitle");
siteTitle.textContent = localStorage.getItem("novel-title") || "📖 연재소설";
siteTitle.onclick = () => {
  const t = prompt("소설 제목을 입력하세요", siteTitle.textContent);
  if (t) { siteTitle.textContent = t; localStorage.setItem("novel-title", t); }
};

function setProfileCategory(cat){
  profileCategory = cat;
  document.querySelectorAll("#profileCatRow .cat-btn").forEach(b => b.classList.toggle("active", b.dataset.cat === cat));
  const isIdol = cat === "idol";
  document.getElementById("profilePositionInput").style.display = isIdol ? "" : "none";
  document.getElementById("profileIgInput").style.display = isIdol ? "none" : "";
  document.getElementById("profileTwInput").style.display = isIdol ? "none" : "";
  document.getElementById("profileTwPrivInput").style.display = isIdol ? "none" : "";
  document.getElementById("profileFavInput").style.display = isIdol ? "none" : "";
  document.getElementById("profileBirthInput").placeholder = isIdol ? "생년월일" : "나이";
  document.getElementById("profileJobInput").placeholder = isIdol ? "소속" : "소속/직업";
}
document.querySelectorAll("#profileCatRow .cat-btn").forEach(b => b.onclick = () => setProfileCategory(b.dataset.cat));
function openProfileChapterSheet(){
  editingProfileCard = null;
  ["profileNameInput", "profilePositionInput", "profileBirthInput", "profileJobInput", "profileMbtiInput", "profileIgInput", "profileTwInput", "profileTwPrivInput", "profileFavInput", "profileTraitInput"].forEach(id => document.getElementById(id).value = "");
  profilePhotoFile = null;
  const prev = document.getElementById("profilePhotoPreview");
  prev.style.display = "none"; prev.src = "";
  setProfileCategory("fan");
  document.querySelector("#profileChapterOverlay .mono").textContent = "인물소개 추가";
  document.getElementById("profileChapterOk").textContent = "추가";
  document.getElementById("profileChapterOverlay").style.display = "flex";
}
function openProfileEditSheet(card){
  editingProfileCard = card;
  profilePhotoFile = null;
  document.getElementById("profileNameInput").value = card.dataset.name || "";
  document.getElementById("profilePositionInput").value = card.dataset.position || "";
  document.getElementById("profileBirthInput").value = card.dataset.birth || "";
  document.getElementById("profileJobInput").value = card.dataset.job || "";
  document.getElementById("profileMbtiInput").value = card.dataset.mbti || "";
  document.getElementById("profileIgInput").value = card.dataset.ig || "";
  document.getElementById("profileTwInput").value = card.dataset.tw || "";
  document.getElementById("profileTwPrivInput").value = card.dataset.twpriv || "";
  document.getElementById("profileFavInput").value = card.dataset.fav || "";
  document.getElementById("profileTraitInput").value = card.dataset.trait || "";
  setProfileCategory(card.dataset.category || "fan");
  const prev = document.getElementById("profilePhotoPreview");
  if (card.dataset.photo) { prev.src = card.dataset.photo; prev.style.display = "block"; }
  else { prev.style.display = "none"; prev.src = ""; }
  document.querySelector("#profileChapterOverlay .mono").textContent = "인물소개 수정";
  document.getElementById("profileChapterOk").textContent = "저장";
  document.getElementById("profileChapterOverlay").style.display = "flex";
}
document.getElementById("profileChapterCancel").onclick = () => { editingProfileCard = null; document.getElementById("profileChapterOverlay").style.display = "none"; };
document.getElementById("profileChapterOverlay").onclick = e => { if (e.target.id === "profileChapterOverlay") { editingProfileCard = null; e.currentTarget.style.display = "none"; } };
document.getElementById("profilePhotoInput").onchange = e => {
  const f = e.target.files[0];
  if (!f) return;
  profilePhotoFile = f;
  const prev = document.getElementById("profilePhotoPreview");
  prev.src = URL.createObjectURL(f);
  prev.style.display = "block";
};
document.getElementById("profileChapterOk").onclick = async () => {
  const name = document.getElementById("profileNameInput").value.trim();
  if (!name) { alert("이름을 입력해주세요"); return; }
  const btn = document.getElementById("profileChapterOk");
  const isEdit = !!editingProfileCard;
  btn.disabled = true; btn.textContent = isEdit ? "저장 중..." : "추가 중...";
  try {
    const photoUrl = profilePhotoFile ? await uploadToCloudinary(profilePhotoFile) : (isEdit ? (editingProfileCard.dataset.photo || "") : "");
    const cardHtml = buildProfileHTML(photoUrl, name,
      document.getElementById("profileBirthInput").value.trim(),
      document.getElementById("profileJobInput").value.trim(),
      document.getElementById("profileMbtiInput").value.trim(),
      document.getElementById("profileIgInput").value.trim(),
      document.getElementById("profileTwInput").value.trim(),
      document.getElementById("profileTwPrivInput").value.trim(),
      document.getElementById("profileFavInput").value.trim(),
      document.getElementById("profileTraitInput").value.trim(),
      profileCategory,
      document.getElementById("profilePositionInput").value.trim());
    if (isEdit) {
      const oldCat = editingProfileCard.dataset.category || currentProfCat;
      const temp = document.createElement("div");
      temp.innerHTML = cardHtml;
      const newCardEl = temp.firstElementChild;
      if (oldCat === profileCategory) {
        // 같은 카테고리(같은 파일) 안에서 수정
        editingProfileCard.replaceWith(newCardEl);
        editingProfileCard = null;
        commitChange();
      } else {
        // 다른 카테고리(다른 파일)로 이동: 현재 파일에서 제거하고 대상 파일에 추가
        editingProfileCard.remove();
        editingProfileCard = null;
        commitChange();
        const target = (profDataCache && profDataCache["content_" + profileCategory]) || "";
        await updateDoc(doc(db, "chapters", currentFolder), { ["content_" + profileCategory]: target + newCardEl.outerHTML + "<p><br></p>" });
      }
      document.getElementById("profileChapterOverlay").style.display = "none";
    } else {
      let profChapter = chaptersArr.find(f => f.profile);
      if (!profChapter) {
        const existing = await getDocs(query(foldersCol, where("profile", "==", true)));
        if (!existing.empty) {
          const d = existing.docs[0];
          profChapter = { id: d.id, ...d.data() };
        } else {
          const minNum = chaptersArr.reduce((m, f) => Math.min(m, f.num || 0), 0);
          const newRef = await addDoc(foldersCol, { name: "인물소개", num: minNum - 1, profile: true, content_idol: "", content_fan: "", content_other: "", createdAt: Date.now() });
          profChapter = { id: newRef.id };
        }
      }
      const field = "content_" + profileCategory;
      await updateDoc(doc(db, "chapters", profChapter.id), { [field]: (profChapter[field] || "") + cardHtml + "<p><br></p>" });
      document.getElementById("profileChapterOverlay").style.display = "none";
      currentProfCat = profileCategory; // 추가한 카테고리(파일)로 자동 전환해서 보여줌
      selectFolder(profChapter.id);
    }
  } catch (e) { alert("저장 실패 - 네트워크를 확인해주세요"); }
  btn.disabled = false; btn.textContent = isEdit ? "저장" : "추가";
};

// ---- 회차(chapters) ----
onSnapshot(query(foldersCol, orderBy("num", "asc")), snap => {
  const row = document.getElementById("folderRow");
  row.innerHTML = "";
  const addBtn = document.createElement("button");
  addBtn.className = "chip add"; addBtn.id = "newFolderBtn"; addBtn.textContent = "+ 회차";
  addBtn.onclick = () => openFolderSheet();
  row.appendChild(addBtn);
  const profBtn = document.createElement("button");
  profBtn.className = "chip add"; profBtn.id = "newProfileBtn"; profBtn.textContent = "+ 인물소개";
  profBtn.onclick = () => openProfileChapterSheet();
  row.appendChild(profBtn);
  const arr = [];
  snap.forEach(d => arr.push({ id: d.id, ...d.data() }));
  chaptersArr = arr;
  arr.forEach(f => {
    const wrap = document.createElement("div"); wrap.className = "chipwrap";
    const chip = document.createElement("button");
    chip.className = "chip" + (currentFolder === f.id ? " active" : "") + (f.locked ? " locked" : "");
    chip.textContent = (f.num ? f.num + "화" : "") + (f.name ? " " + f.name : "");
    chip.dataset.fid = f.id;
    chip.onclick = () => selectFolder(f.id);
    const edit = document.createElement("button");
    edit.className = "chipedit"; edit.textContent = "⋯";
    edit.onclick = () => openFolderSheet(f.id, f.name, f.num);
    wrap.append(chip, edit);
    row.appendChild(wrap);
    if (currentFolder === f.id) applyLockUI(!!f.locked);
  });
  if (!currentFolder && arr.length) selectFolder(arr[0].id);
});

function openFolderSheet(id, name, num){
  editingFolderId = id || null;
  document.getElementById("folderSheetTitle").textContent = id ? "회차 수정" : "새 회차";
  document.getElementById("folderNumInput").value = num || "";
  document.getElementById("folderNameInput").value = name || "";
  document.getElementById("folderOk").textContent = id ? "저장" : "만들기";
  document.getElementById("folderDelete").style.display = id ? "block" : "none";
  document.getElementById("overlay").style.display = "flex";
  document.getElementById("folderNumInput").focus();
}
document.getElementById("folderCancel").onclick = () => document.getElementById("overlay").style.display = "none";
document.getElementById("overlay").onclick = e => { if (e.target.id === "overlay") e.currentTarget.style.display = "none"; };
document.getElementById("folderOk").onclick = async () => {
  const name = document.getElementById("folderNameInput").value.trim();
  const num = Number(document.getElementById("folderNumInput").value) || null;
  if (!name && !num) return;
  document.getElementById("overlay").style.display = "none";
  try {
    if (editingFolderId) {
      await updateDoc(doc(db, "chapters", editingFolderId), { name, num });
    } else {
      await addDoc(foldersCol, { name, num, content: "", createdAt: Date.now() });
    }
  } catch (e) { alert("저장 실패 - 네트워크를 확인해주세요"); }
};
document.getElementById("folderDelete").onclick = async () => {
  if (!editingFolderId) return;
  if (!confirm("이 회차를 삭제할까요?")) return;
  document.getElementById("overlay").style.display = "none";
  const fid = editingFolderId;
  try { await deleteDoc(doc(db, "chapters", fid)); } catch (e) { alert("삭제 실패 - 네트워크를 확인해주세요"); return; }
  if (currentFolder === fid) {
    currentFolder = null;
    if (chapterUnsub) chapterUnsub();
    editor.innerHTML = ""; editor.style.display = "none";
    fab.style.display = "none";
    document.getElementById("fabLock").style.display = "none";
    emptyEl.style.display = "block";
  }
};

function selectFolder(id) {
  currentFolder = id;
  document.querySelectorAll("#folderRow .chip:not(.add)").forEach(el => el.classList.toggle("active", el.dataset.fid === id));
  emptyEl.style.display = "none";
  editor.style.display = "block";
  fab.style.display = "inline-flex";
  document.getElementById("fabLock").style.display = "inline-block";
  const isProf = !!chaptersArr.find(f => f.id === id && f.profile);
  currentIsProf = isProf;
  document.getElementById("profCatFilter").classList.toggle("show", isProf);
  if (isProf) {
    document.querySelectorAll("#profCatFilter .cat-btn").forEach(x => x.classList.toggle("active", x.dataset.pf === currentProfCat));
  }
  if (chapterUnsub) chapterUnsub();
  chapterUnsub = onSnapshot(doc(db, "chapters", id), snap => {
    const data = snap.data();
    applyLockUI(!!(data && data.locked));
    if (isProf) profDataCache = data;
    if (document.activeElement === editor) return;
    if (isProf) { renderProfEditor(); return; }
    editor.innerHTML = (data && data.content) || "";
    history = [editor.innerHTML]; historyIndex = 0;
  });
}
// 인물소개 폴더 안에서, 현재 선택된 카테고리(파일)의 내용만 에디터에 표시
function renderProfEditor(){
  editor.innerHTML = (profDataCache && profDataCache["content_" + currentProfCat]) || "";
  history = [editor.innerHTML]; historyIndex = 0;
}
document.querySelectorAll("#profCatFilter .cat-btn").forEach(b => b.onclick = () => {
  currentProfCat = b.dataset.pf;
  document.querySelectorAll("#profCatFilter .cat-btn").forEach(x => x.classList.toggle("active", x === b));
  renderProfEditor(); // 폴더 안 다른 파일로 전환
});
function applyLockUI(locked){
  folderLocked = locked;

function insertAtCursor(html, opts){
  if (folderLocked) return;
  const silent = opts && opts.silent;
  const appendEnd = opts && opts.appendEnd;
  if (!silent) editor.focus({ preventScroll: true });
  let range;
  if (appendEnd) {
    range = document.createRange();
    range.selectNodeContents(editor);
    range.collapse(false);
  } else if (silent) {
    if (savedRange && editor.contains(savedRange.startContainer)) {
      range = savedRange.cloneRange();
    } else {
      range = document.createRange();
      range.selectNodeContents(editor);
      range.collapse(false);
    }
  } else {
    if (savedRange && editor.contains(savedRange.startContainer)) {
      range = savedRange.cloneRange();
    } else {
      range = document.createRange();
      range.selectNodeContents(editor);
      range.collapse(false);
    }
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }
  const tpl = document.createElement("template");
  tpl.innerHTML = html;
  const frag = tpl.content;
  const lastNode = frag.lastChild;
  range.insertNode(frag);
  if (!silent) {
    if (lastNode) {
      range.setStartAfter(lastNode);
      range.collapse(true);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }
    if (lastNode && lastNode.scrollIntoView) {
      lastNode.scrollIntoView({ block: "end", behavior: "auto" });
    } else {
      window.scrollTo({ top: document.body.scrollHeight, behavior: "auto" });
    }
  }
  commitChange();
}

function renderCommunityComments(){
  const list = document.getElementById("communityCommentList");
  list.innerHTML = "";
  function renderNode(node, depth){
    const row = document.createElement("div");
    row.className = "ccItem" + (communityReplyTarget === node.id ? " sel" : "");
    row.style.marginLeft = (depth * 14) + "px";
    const span = document.createElement("span"); span.textContent = (depth ? "ㄴ " : "") + node.text;
    const rm = document.createElement("button"); rm.textContent = "×";
    rm.onclick = e => {
      e.stopPropagation();
      const ids = new Set([node.id]);
      let changed = true;
      while (changed) { changed = false; communityComments.forEach(n => { if (n.parent !== null && ids.has(n.parent) && !ids.has(n.id)) { ids.add(n.id); changed = true; } }); }
      communityComments = communityComments.filter(n => !ids.has(n.id));
      if (ids.has(communityReplyTarget)) communityReplyTarget = null;
      renderCommunityComments();
    };
    row.onclick = () => { communityReplyTarget = communityReplyTarget === node.id ? null : node.id; renderCommunityComments(); };
    row.append(span, rm);
    list.appendChild(row);
    communityComments.filter(n => n.parent === node.id).forEach(child => renderNode(child, depth + 1));
  }
  communityComments.filter(n => n.parent === null).forEach(root => renderNode(root, 0));
}

    row.style.display = "flex"; row.style.alignItems = "center"; row.style.gap = "6px";
    const span = document.createElement("span");
    span.style.cssText = "flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap";
    span.textContent = (depth ? "ㄴ " : "") + (dispName(c?.twitterName || c?.name, c) || "user") + " " + node.text.slice(0, 24);
    const rm = document.createElement("button"); rm.textContent = "×"; rm.style.cssText = "background:none;border:none;color:var(--danger);font-size:13px;padding:2px 4px";
    rm.onclick = e2 => {
      e2.stopPropagation();
      const ids = new Set([node.id]);
      let changed = true;
      while (changed) { changed = false; blockThread.forEach(n => { if (n.parent !== null && ids.has(n.parent) && !ids.has(n.id)) { ids.add(n.id); changed = true; } }); }
      blockThread = blockThread.filter(n => !ids.has(n.id));
      if (ids.has(blockReplyTarget)) blockReplyTarget = null;
      renderThreadPreview();
    };
    row.onclick = () => { blockReplyTarget = blockReplyTarget === node.id ? null : node.id; renderThreadPreview(); };
    row.append(span, rm);
    el.appendChild(row);
    blockThread.filter(n => n.parent === node.id).forEach(child => renderNode(child, depth + 1));
  }
  blockThread.filter(n => n.parent === null).forEach(root => renderNode(root, 0));
}
function buildBlockCharRow(){
  const row = document.getElementById("blockCharRow");
  row.innerHTML = "";
  Object.values(charactersMap).forEach(c => {
    const b = document.createElement("button");
    b.className = "chip" + (blockCharId === c.id ? " active" : "");
    b.textContent = dispName(c.name, c);
    b.onclick = () => { blockCharId = c.id; blockTwAccount = c.twitterPriv ? "private" : "public"; buildBlockCharRow(); };
    row.appendChild(b);
  });
  buildBlockTwAccountRow();
}
function buildBlockTwAccountRow(){
  const row = document.getElementById("blockTwAccountRow");
  row.innerHTML = "";
  const c = blockCharId ? charactersMap[blockCharId] : null;
  if (blockType !== "twitter" || !c || (!c.twitter && !c.twitterPriv)) { row.style.display = "none"; return; }
  if (c.twitter && !c.twitterPriv) blockTwAccount = "public";
  if (!c.twitter && c.twitterPriv) blockTwAccount = "private";
  if (c.twitter && c.twitterPriv && blockTwAccount !== "public" && blockTwAccount !== "private") blockTwAccount = "private";
  row.style.display = "flex";
  if (c.twitterPriv) {
    const b = document.createElement("button");
    b.className = blockTwAccount === "private" ? "active" : "";
    b.textContent = "🔒 " + (c.twitterPrivName || c.name || "");
    b.onclick = () => { blockTwAccount = "private"; buildBlockTwAccountRow(); };
    row.appendChild(b);
  }
  if (c.twitter) {
    const b = document.createElement("button");
    b.className = blockTwAccount === "public" ? "active" : "";
    b.textContent = "공개 " + (c.twitterName || c.name || "");
    b.onclick = () => { blockTwAccount = "public"; buildBlockTwAccountRow(); };
    row.appendChild(b);
  }
}
document.querySelectorAll("#blockPosRow button").forEach(btn => {
  btn.onclick = () => {
    blockPosition = btn.dataset.p;
    document.querySelectorAll("#blockPosRow button").forEach(b => b.classList.toggle("active", b === btn));
  };
});
document.getElementById("blockFileInput").onchange = e => {
  let files = [...e.target.files];
  if (blockType === "twitter" && files.length > 4) {
    alert("트위터는 최대 4장까지 첨부 가능합니다");
    files = files.slice(0, 4);
  }
  blockPending = files;
  renderBlockPreview();
};
function renderBlockPreview(){
  const prev = document.getElementById("blockPreview");
  prev.innerHTML = "";
  blockPending.forEach((f, i) => {
    const t = document.createElement("div"); t.className = "thumb";
    const img = document.createElement("img"); img.src = URL.createObjectURL(f);
    const rm = document.createElement("button"); rm.className = "rm"; rm.textContent = "×";
    rm.onclick = () => { blockPending.splice(i, 1); renderBlockPreview(); };
    t.append(img, rm); prev.appendChild(t);
  });
}

document.getElementById("blockInsertBtn").onclick = async () => {
  const text = document.getElementById("blockText").value.trim();
  const files = blockPending;
  const communityTitleVal = document.getElementById("communityTitleInput").value.trim();
  const communityViewsVal = document.getElementById("communityViewsInput").value.trim();
  const communityTimeVal = document.getElementById("communityTimeInput").value.trim();
  const articleTitleVal = document.getElementById("articleTitleInput").value.trim();
  const articleSiteVal = document.getElementById("articleSiteInput").value.trim();
  const articleReporterVal = document.getElementById("articleReporterInput").value.trim();
  const hasCommunityExtra = blockType === "community" && (communityComments.length > 0 || communityTitleVal);
  const hasArticleExtra = blockType === "article" && (articleTitleVal || articleSiteVal || articleReporterVal);
  if (!text && !files.length && !blockThread.length && !hasCommunityExtra && !hasArticleExtra) return;
  const btn = document.getElementById("blockInsertBtn");
  btn.disabled = true; btn.textContent = "삽입중...";
  try {
    const urls = files.length ? await Promise.all(files.map(uploadToCloudinary)) : [];
    let html;
    if (blockType === "twitter") {
      const thread = [...blockThread];
      const spinVal = thread.length ? "" : document.getElementById("blockSpinInput").value.trim();
      if (text || urls.length || spinVal || !thread.length) thread.push({ id: blockIdSeq++, charId: blockCharId, twAccount: blockTwAccount, text, images: urls, spin: spinVal, parent: thread.length ? blockReplyTarget : null });
      html = buildTwitterThreadHTML(thread);
      blockThread = []; blockReplyTarget = null;
      document.getElementById("blockSpinInput").value = "";
      renderThreadPreview();
    } else if (blockType === "community") {
      html = buildCommunityHTML(communitySite, communityTitleVal, communityViewsVal, communityTimeVal, text, urls, communityComments);
      communityComments = []; communityReplyTarget = null;
      renderCommunityComments();
      document.getElementById("communityTitleInput").value = "";
      document.getElementById("communityViewsInput").value = "";
      document.getElementById("communityTimeInput").value = "";
    } else if (blockType === "article") {
      html = buildArticleHTML(articleTitleVal, articleSiteVal, articleReporterVal, text, urls);
      document.getElementById("articleTitleInput").value = "";
      document.getElementById("articleSiteInput").value = "";
      document.getElementById("articleReporterInput").value = "";
    } else {
      html = buildEmbedHTML(blockType, text, urls, blockCharId, blockPosition);
    }
    insertAtCursor(html + "<p><br></p>", { appendEnd: true });
    document.getElementById("blockText").value = "";
    document.getElementById("blockSpinInput").value = "";
    blockPending = [];
    renderBlockPreview();
    document.getElementById("blockText").focus();
  } catch (err) {
    alert("업로드 실패 - 다시 시도해주세요");
  }
  btn.disabled = false; btn.textContent = "삽입";
};

const VERIFIED_SVG = `<svg class="verified" viewBox="0 0 22 22" fill="#1d9bf0"><path d="M20.396 11c-.018-.646-.215-1.275-.57-1.816-.354-.54-.852-.972-1.438-1.246.223-.607.27-1.264.14-1.897-.131-.634-.437-1.218-.882-1.687-.47-.445-1.053-.75-1.687-.882-.633-.13-1.29-.083-1.897.14-.273-.587-.704-1.086-1.245-1.44S11.647 1.62 11 1.604c-.646.017-1.273.213-1.813.568s-.969.854-1.24 1.44c-.608-.223-1.267-.272-1.902-.14-.635.13-1.22.436-1.69.882-.445.47-.749 1.055-.878 1.688-.13.633-.08 1.29.144 1.896-.587.274-1.087.705-1.443 1.245-.356.54-.555 1.17-.573 1.817.02.647.218 1.276.574 1.817.356.54.856.972 1.443 1.245-.224.606-.274 1.263-.144 1.896.13.634.433 1.218.877 1.688.47.443 1.054.747 1.687.878.633.132 1.29.084 1.897-.136.274.586.705 1.084 1.246 1.439.54.354 1.17.551 1.816.569.647-.016 1.276-.213 1.817-.567s.972-.854 1.245-1.44c.604.239 1.266.296 1.903.164.636-.132 1.22-.447 1.68-.907.46-.46.776-1.044.908-1.681s.075-1.299-.165-1.903c.586-.274 1.084-.705 1.439-1.246.354-.54.551-1.17.569-1.816zM9.662 14.85l-3.429-3.428 1.293-1.293 2.136 2.136 4.136-4.136 1.293 1.293z"/></svg>`;
function twEntryHTML(entry){
  const character = entry.charId ? charactersMap[entry.charId] : null;
  const isPriv = entry.twAccount === "private";
  const dispNameStr = ((isPriv ? character?.twitterPrivName : character?.twitterName) || character?.name || "user") + (isPriv || (character && character.private) ? " 🔒" : "");
  const handle = (isPriv ? character?.twitterPriv : character?.twitter) || "@user";
  const avatarUrl = (isPriv ? character?.twitterPrivAvatar : character?.twitterAvatar) || "";
  const avStyle = avatarUrl ? ` style="background-image:url('${avatarUrl.replace(/'/g, "%27")}')"` : "";
  const badge = (!isPriv && character?.twitterVerified) ? VERIFIED_SVG : "";
  const n = entry.images.length;
  const cls = n === 1 ? "n1" : n === 2 ? "n2" : n === 3 ? "n3" : "n4plus";
  const imgsHtml = n ? `<div class="imgs ${cls}">${entry.images.map(u => `<img src="${u}">`).join("")}</div>` : "";
  const textHtml = entry.text ? formatText(entry.text) : "";
  const spinHtml = entry.spin ? `<div class="spin-box"><div class="spin-label">Spin spin</div><div class="spin-text">${escapeHtml(entry.spin)}</div></div><div class="spin-source">출처: spin-spin.com</div>` : "";
  return `<div class="tw-entry">
    <div class="av"${avStyle}></div>
    <div class="twbody">
      <div class="twhead"><b>${escapeHtml(dispNameStr)}</b>${badge}<span>${escapeHtml(handle)}</span></div>
      <div class="twtext">${textHtml}</div>
      ${imgsHtml}
      ${spinHtml}
    </div>
  </div>`;
}
function buildTwitterThreadHTML(thread){
  function renderNode(node){
    const children = thread.filter(n => n.parent === node.id).map(c => `<div class="tw-reply">${renderNode(c)}</div>`).join("");
    return twEntryHTML(node) + children;
  }
  const root = thread.find(n => n.parent === null || n.parent === undefined) || thread[0];
  return `<div class="embed block twitter" contenteditable="false">
    ${renderNode(root)}
    <button class="embed-del">×</button>
  </div>`;
}

function buildEmbedHTML(type, text, images, charId, position){
  const character = charId ? charactersMap[charId] : null;
  const n = images.length;
  const cls = n === 1 ? "n1" : n === 2 ? "n2" : n === 3 ? "n3" : "n4plus";
  const imgsHtml = n ? `<div class="imgs ${cls}">${images.map(u => `<img src="${u}">`).join("")}</div>` : "";
  const textHtml = text ? formatText(text) : "";

  if (type === "instagram") {
    const avatarUrl = character?.instagramAvatar || "";
    const avStyle = avatarUrl ? ` style="background-image:url('${avatarUrl.replace(/'/g, "%27")}')"` : "";
    const uname = character?.instagram || dispName(character?.instagramName || character?.name, character) || "user";
    const igimgs = n ? `<div class="igimgwrap"><div class="igimgs">${images.map(u => `<img src="${u}">`).join("")}</div>${n > 1 ? `<button class="ignav prev" data-dir="-1">‹</button><button class="ignav next" data-dir="1">›</button>` : ""}</div>` : "";
    return `<div class="embed block instagram" contenteditable="false">
      <div class="ighead"><div class="av"${avStyle}></div><div class="uname">${escapeHtml(uname)}</div></div>
      ${igimgs}
      <div class="igfoot">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 1 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M3 12c0-4.4 4-8 9-8s9 3.6 9 8-4 8-9 8c-1.1 0-2.2-.2-3.2-.5L4 21l1.4-4.4C4.1 15.3 3 13.7 3 12z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4z"/></svg>
      </div>
      <div class="igbody"><div class="igtext">${textHtml ? `<b>${escapeHtml(uname)}</b>${textHtml}` : ""}</div></div>
      <button class="embed-del">×</button>
    </div>`;
  }
  const pos = position === "right" ? "right" : "left";
  return `<div class="embed block ${type}" contenteditable="false">
    <div class="bubblerow ${pos}">
      <div class="bubblecol">
        <div class="bubble">${textHtml}${imgsHtml}</div>
      </div>
    </div>
    <button class="embed-del">×</button>
  </div>`;
}

function buildCommunityHTML(site, title, views, time, body, images, comments){
  const meta = COMMUNITY_META[site] || COMMUNITY_META.instiz;
  const n = images.length;
  const cls = n === 1 ? "n1" : n === 2 ? "n2" : n === 3 ? "n3" : "n4plus";
  const imgsHtml = n ? `<div class="imgs ${cls}">${images.map(u => `<img src="${u}">`).join("")}</div>` : "";
  const bodyHtml = body ? formatText(body) : "";
  const titleHtml = title ? `<div class="cm-title">${escapeHtml(title)}</div>` : "";
  const metaBits = [escapeHtml(meta.nick)];
  if (views) metaBits.push(`조회 ${escapeHtml(views)}`);
  if (time) metaBits.push(escapeHtml(time));
  function renderNode(node){
    const children = comments.filter(n => n.parent === node.id).map(c2 => `<div class="cm-reply">${renderNode(c2)}</div>`).join("");
    return `<div class="cm-comment"><b>${escapeHtml(meta.nick)}</b>${formatText(node.text)}</div>${children}`;
  }
  const commentsHtml = comments.length
    ? `<div class="cm-comments">${comments.filter(n => n.parent === null).map(renderNode).join("")}</div>`
    : "";
  return `<div class="embed block community site-${site}" contenteditable="false">
    <div class="cm-badge">${meta.label}</div>
    ${titleHtml}
    <div class="cm-meta">${metaBits.join(" · ")}</div>
    <div class="cm-body">${bodyHtml}${imgsHtml}</div>
    ${commentsHtml}
    <button class="embed-del">×</button>
  </div>`;
}
function buildArticleHTML(title, site, reporter, body, images){
  const n = images.length;
  const cls = n === 1 ? "n1" : n === 2 ? "n2" : n === 3 ? "n3" : "n4plus";
  const imgsHtml = n ? `<div class="imgs ${cls}">${images.map(u => `<img src="${u}">`).join("")}</div>` : "";
  const bodyHtml = body ? formatText(body) : "";
  const siteHtml = site ? `<div class="art-site">${escapeHtml(site)}</div>` : "";
  const titleHtml = title ? `<div class="art-title">${escapeHtml(title)}</div>` : "";
  const reporterHtml = reporter ? `<div class="art-reporter">${escapeHtml(reporter)} 기자</div>` : "";
  return `<div class="embed block article" contenteditable="false">
    ${siteHtml}
    ${titleHtml}
    ${reporterHtml}
    <div class="art-body">${bodyHtml}${imgsHtml}</div>
    <button class="embed-del">×</button>
  </div>`;
}

function dispName(name, c){ return (name || "") + (c && c.private ? " 🔒" : ""); }
function buildProfileHTML(photo, name, birth, job, mbti, ig, tw, twPriv, fav, trait, category, position){
  category = category || "fan";
  const photoHtml = photo
    ? `<div class="prof-photo"><img src="${photo}"></div>`
    : `<div class="prof-photo-add">📎 사진 추가</div>`;
  const rowDefs = category === "idol"
    ? [["포지션", "position", position], ["생년월일", "birth", birth], ["소속", "job", job], ["MBTI", "mbti", mbti], ["특징", "trait", trait]]
    : [["나이", "birth", birth], ["소속/직업", "job", job], ["MBTI", "mbti", mbti],
       ["인스타그램", "ig", ig], ["트위터", "tw", tw], ["트위터(비공개)", "twpriv", twPriv],
       ["최애", "fav", fav], ["특징", "trait", trait]];
  const rows = rowDefs.filter(([, , v]) => v).map(([k, field, v]) => `<div class="prof-row"><span class="prof-k">${escapeHtml(k)}</span><span class="prof-v" data-field="${field}">${formatText(v)}</span></div>`).join("");
  const dataAttrs = [
    ["data-photo", photo], ["data-name", name], ["data-birth", birth], ["data-job", job],
    ["data-mbti", mbti], ["data-ig", ig], ["data-tw", tw], ["data-twpriv", twPriv],
    ["data-fav", fav], ["data-trait", trait], ["data-category", category], ["data-position", position]
  ].map(([k, v]) => `${k}="${escapeHtml(v || "")}"`).join(" ");
  return `<div class="embed block profile" ${dataAttrs} contenteditable="false">
    <button class="prof-edit-btn" title="사진 변경">📎</button>
    ${photoHtml}
    <div class="prof-head">
      <div class="prof-name" data-field="name">${escapeHtml(name || "이름 없음")}</div>
    </div>
    ${rows ? `<div class="prof-rows">${rows}</div>` : ""}
    <button class="embed-del">×</button>
  </div>`;
}
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function formatText(s) {
  const esc = escapeHtml(s).replace(/\n/g, "<br>");
  return esc.replace(/(^|\s|>)(#[^\s#<]+)/g, (m, p1, p2) => p1 + '<span class="hashtag">' + p2 + '</span>');
}
