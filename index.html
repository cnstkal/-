<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>연재</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

:root{
  --bg:#141210; --bg2:#1c1916; --bg3:#252119; --bg4:#2a2620; --bg0:#0e0c0a;
  --border:#3a332a; --border2:#2a2620; --borderdark:#221f1a;
  --text:#eee7d8; --text-dim:#d8cba8; --text-dim2:#c9c0ac; --text-mut:#a89a7d;
  --text-faint:#7a7264; --text-faint2:#6a6254; --text-faint3:#5a5346; --text-faint4:#8a8064;
  --accent:#c9a875; --accent-text:#141210;
  --danger:#a8332b; --danger-text:#fff;
  --hashtag:#5b9dd9;
  --kakao-bubble:#f5e14a; --kakao-text:#3c1e1e;
  --im-blue:#0b84ff; --im-gray:#2f2f31; --im-gray-text:#eee7d8;
}
body.light{
  --bg:#f7f5ef; --bg2:#ffffff; --bg3:#f1eee5; --bg4:#e9e4d6; --bg0:#e2dbc8;
  --border:#ddd5c2; --border2:#e6e0d1; --borderdark:#d3cbb6;
  --text:#2b2620; --text-dim:#4d4433; --text-dim2:#3f382a; --text-mut:#6b5f47;
  --text-faint:#8c8168; --text-faint2:#a49877; --text-faint3:#8c8168; --text-faint4:#7a6f56;
  --accent:#a8823f; --accent-text:#ffffff;
  --danger:#c1453a; --danger-text:#fff;
  --hashtag:#1d6fc9;
  --im-gray:#e5e5ea; --im-gray-text:#1c1c1e;
}

*{box-sizing:border-box; margin:0; padding:0; touch-action:manipulation; -webkit-tap-highlight-color:transparent; letter-spacing:-0.02em;}
html,body{width:100%; height:100%; overflow-x:hidden; overflow-y:auto;}
body{
  background:var(--bg); color:var(--text); font-family:'Pretendard',sans-serif;
  min-height:100vh; min-height:100dvh; overscroll-behavior-y:auto;
  transition:background .2s,color .2s;
}
h1{font-weight:700;}
.mono{font-family:'Pretendard',sans-serif; font-weight:600;}
button, input, textarea{font-family:inherit;}
.hashtag{color:var(--hashtag); font-weight:600;}

#topbar{position:sticky; top:0; z-index:20; background:var(--bg2); border-bottom:1px solid var(--border); padding:10px 12px 8px;}
#topbar .titlerow{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; gap:8px;}
#topbar h1{font-family:'Pretendard',sans-serif; font-weight:800; font-size:14px; color:var(--accent); cursor:pointer;}
.topbtns{display:flex; gap:6px; flex:0 0 auto;}
#charBtn, #themeToggle{background:none; border:1px solid var(--border); color:var(--text-dim); border-radius:16px; padding:5px 10px; font-size:12.5px;}
#folderRow{display:flex; gap:6px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:2px;}
#folderRow::-webkit-scrollbar{display:none;}
#typeFilterRow{display:flex; gap:6px; overflow-x:auto; -webkit-overflow-scrolling:touch; margin-top:6px;}
#typeFilterRow::-webkit-scrollbar{display:none;}
.chip{
  flex:0 0 auto; font-size:13px; padding:7px 13px; border-radius:16px; background:var(--bg4);
  color:var(--text-dim); white-space:nowrap; border:1px solid var(--border);
}
.chip.active{background:var(--accent); color:var(--accent-text); font-weight:700; border-color:var(--accent);}
.chip.add{background:none; border:1px dashed var(--text-faint3); color:var(--accent);}
.fchip{flex:0 0 auto; font-size:12px; padding:6px 12px; border-radius:14px; background:var(--bg4); color:var(--text-mut); border:1px solid var(--border);}
.fchip.active{background:var(--danger); color:var(--danger-text); font-weight:700; border-color:var(--danger);}

#composer{padding:10px 12px; background:var(--bg2); border-bottom:6px solid var(--bg0); display:none;}
#typeRow{display:flex; gap:6px; margin-bottom:8px; flex-wrap:wrap;}
#typeRow button{
  flex:1 1 18%; font-size:11.5px; padding:8px 0; border-radius:8px; background:var(--bg4); color:var(--text-mut); border:none;
}
#typeRow button.active{background:var(--danger); color:var(--danger-text); font-weight:700;}
#charRow, #posRow{display:none; gap:6px; overflow-x:auto; margin-bottom:8px; -webkit-overflow-scrolling:touch;}
#charRow.show, #posRow.show{display:flex;}
#textInput{
  width:100%; min-height:52px; max-height:200px; background:var(--bg3); color:var(--text); border:1px solid var(--border);
  border-radius:10px; padding:10px 12px; font-size:15px; resize:none; outline:none;
}
#preview{display:flex; gap:6px; overflow-x:auto; margin-top:8px;}
#preview .thumb{position:relative; flex:0 0 auto;}
#preview img{width:56px; height:56px; object-fit:cover; border-radius:8px;}
#preview .rm{position:absolute; top:-5px; right:-5px; background:var(--danger); color:var(--danger-text); border-radius:50%; width:18px; height:18px; font-size:11px; border:none; line-height:18px;}
#timeInput{width:100%; background:var(--bg3); color:var(--text-dim); border:1px solid var(--border); border-radius:8px; padding:7px 10px; font-size:12.5px; margin-top:6px;}
.composer-row{display:flex; justify-content:space-between; align-items:center; margin-top:8px;}
.typeSwitchRow{display:flex; gap:6px; margin:6px 0; flex-wrap:wrap;}
.typeSwitchRow button{flex:1 1 18%; font-size:11px; padding:6px 0; border-radius:7px; background:var(--bg4); color:var(--text-mut); border:none;}
.typeSwitchRow button.active{background:var(--danger); color:var(--danger-text); font-weight:700;}
#attachBtn{background:none; border:1px solid var(--border); color:var(--text-dim); padding:9px 12px; border-radius:10px; font-size:13px;}
#postBtn{background:var(--accent); color:var(--accent-text); border:none; padding:9px 20px; border-radius:10px; font-size:13px; font-weight:700;}
#postBtn:disabled{opacity:.4;}

#fab{
  position:fixed; right:16px; bottom:calc(16px + env(safe-area-inset-bottom)); z-index:30;
  width:52px; height:52px; border-radius:50%; background:var(--danger); color:var(--danger-text); border:none;
  font-size:26px; box-shadow:0 4px 12px rgba(0,0,0,.5);
}

#main{padding:12px 10px 90px; max-width:520px; margin:0 auto;}
#feed{display:flex; flex-direction:column; gap:12px;}
.card{background:var(--bg2); border-radius:14px; padding:12px 14px; border:1px solid var(--border2); position:relative;}
.card .top{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;}
.card .tag{font-size:10px; letter-spacing:.08em; padding:2px 7px; border-radius:6px; font-weight:700; background:var(--bg4); color:var(--text-mut);}
.card .date{font-size:11px; color:var(--text-faint);}
.card .text{white-space:pre-wrap; line-height:1.55; font-size:14.5px; margin:4px 0 8px; word-break:break-word;}
.imgs{display:grid; gap:3px; border-radius:10px; overflow:hidden; margin-bottom:4px;}
.imgs img{width:100%; object-fit:cover; display:block;}
.imgs.n1 img{max-height:420px;}
.imgs.n2{grid-template-columns:1fr 1fr;} .imgs.n2 img{height:170px;}
.imgs.n3{grid-template-columns:1fr 1fr;} .imgs.n3 img:first-child{grid-row:span 2; height:100%;} .imgs.n3 img{height:110px;}
.imgs.n4plus{grid-template-columns:1fr 1fr;} .imgs.n4plus img{height:120px;}
.delbtn{background:none; border:none; color:var(--text-faint3); font-size:12px; padding:4px;}
.card.pending{opacity:.55;}
#empty{text-align:center; color:var(--text-faint2); font-size:13px; margin-top:60px;}

#overlay, #charOverlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:40; align-items:flex-end;}
#overlay .sheet, #charOverlay .sheet{background:var(--bg2); width:100%; padding:18px 16px calc(18px + env(safe-area-inset-bottom)); border-radius:16px 16px 0 0; max-height:85vh; overflow-y:auto;}
#overlay input, #charOverlay input{width:100%; background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:11px; border-radius:10px; font-size:15px; margin:10px 0;}
#overlay .row, #charOverlay .row{display:flex; gap:8px;}
#overlay button, #charOverlay button{padding:11px; border-radius:10px; border:none; font-size:14px;}
#overlay .row button, #charOverlay .row button{flex:1;}
#overlay .cancel, #charOverlay .cancel{background:var(--bg4); color:var(--text-dim2);}
#overlay .ok, #charOverlay .ok{background:var(--accent); color:var(--accent-text); font-weight:700;}
#charList{margin-top:12px; border-top:1px solid var(--border2); padding-top:10px; display:flex; flex-direction:column; gap:6px;}
.charRowItem{display:flex; align-items:center; gap:8px; padding:8px 10px; background:var(--bg3); border-radius:10px;}
.charRowItem .ci-av{width:28px; height:28px; border-radius:50%; background:var(--accent); flex:0 0 auto;}
.charRowItem .ci-info{flex:1; min-width:0;}
.charRowItem .ci-name{font-size:13.5px; font-weight:700;}
.charRowItem .ci-handles{font-size:11px; color:var(--text-faint);}
.charRowItem button{background:none; border:none; color:var(--text-faint3); font-size:12px; padding:4px 6px;}

#lightbox{display:none; position:fixed; inset:0; background:rgba(0,0,0,.94); z-index:50; align-items:center; justify-content:center;}
#lightbox img{max-width:94vw; max-height:94vh; object-fit:contain;}

.chipwrap{display:flex; flex:0 0 auto;}
.chipwrap .chip{border-radius:16px 0 0 16px;}
.chipedit{flex:0 0 auto; font-size:11px; padding:7px 9px; border-radius:0 16px 16px 0; background:var(--bg4); color:var(--text-faint4); border:1px solid var(--border); border-left:1px solid var(--borderdark);}
.chipwrap .chip.active + .chipedit{background:var(--accent); color:var(--accent-text); border-color:var(--accent);}

.card.instagram{padding:0; overflow:hidden;}
.card.instagram .ighead{display:flex; align-items:center; gap:8px; padding:10px 12px;}
.card.instagram .av{width:30px; height:30px; border-radius:50%; background:linear-gradient(45deg,#feda75,#d62976,#4f5bd5); flex:0 0 auto;}
.card.instagram .uname{font-weight:700; font-size:13px; color:var(--text);}
.card.instagram .igimgs img{width:100%; display:block; max-height:480px; object-fit:cover;}
.card.instagram .igfoot{display:flex; gap:14px; padding:10px 12px 0;}
.card.instagram .igfoot svg{width:23px; height:23px; stroke:var(--text); fill:none; stroke-width:1.8;}
.card.instagram .igbody{padding:6px 12px 10px;}
.card.instagram .igtext{font-size:13.5px; line-height:1.5; white-space:pre-wrap;}
.card.instagram .igtext b{margin-right:6px;}
.card.instagram .igmeta{display:flex; justify-content:space-between; align-items:center; padding:0 12px 10px; font-size:10.5px; color:var(--text-faint);}

.card.twitter{display:flex; gap:10px; padding:12px 14px;}
.card.twitter .av{width:38px; height:38px; border-radius:50%; background:#1d9bf0; flex:0 0 auto;}
.card.twitter .twbody{flex:1; min-width:0;}
.card.twitter .twhead{font-size:14px;}
.card.twitter .twhead b{color:var(--text);}
.card.twitter .twhead span{color:var(--text-faint); margin-left:4px;}
.card.twitter .twtext{font-size:14.5px; line-height:1.45; margin:3px 0 8px; white-space:pre-wrap;}
.card.twitter .imgs{border-radius:14px; border:1px solid var(--border2);}
.card.twitter .twmeta{font-size:11px; color:var(--text-faint); margin-top:6px;}

.card.kakao, .card.imessage{background:none; border:none; padding:2px 0;}
.bubblerow{display:flex; align-items:flex-end; gap:8px;}
.bubblerow.right{flex-direction:row-reverse;}
.bubblerow .b-av{width:32px; height:32px; border-radius:50%; background:var(--accent); flex:0 0 auto;}
.bubblecol{display:flex; flex-direction:column; max-width:72%;}
.bubblerow.right .bubblecol{align-items:flex-end;}
.b-name{font-size:11px; color:var(--text-faint); margin-bottom:3px;}
.bubble{padding:9px 13px; border-radius:16px; font-size:14px; line-height:1.45; white-space:pre-wrap; word-break:break-word;}
.card.kakao .bubblerow:not(.right) .bubble{background:var(--bg3); color:var(--text); border:1px solid var(--border2); border-bottom-left-radius:4px;}
.card.kakao .bubblerow.right .bubble{background:var(--kakao-bubble); color:var(--kakao-text); border-bottom-right-radius:4px;}
.card.imessage .bubblerow:not(.right) .bubble{background:var(--im-gray); color:var(--im-gray-text); border-bottom-left-radius:4px;}
.card.imessage .bubblerow.right .bubble{background:var(--im-blue); color:#fff; border-bottom-right-radius:4px;}
.bubble .imgs{margin-top:4px; border-radius:12px;}
.b-meta{display:flex; gap:8px; align-items:center; margin-top:4px; font-size:10.5px; color:var(--text-faint);}
.bubblerow.right + .b-meta, .bubblecol .b-meta{justify-content:flex-end;}

.editta{width:100%; background:var(--bg3); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:8px; font-size:14px; margin:4px 0;}

/* ---- PC 최적화 (마우스 환경) ---- */
@media (hover:hover) and (pointer:fine){
  .chip, .fchip, #typeRow button, #themeToggle, #charBtn, #attachBtn, #postBtn, .delbtn, .chipedit{cursor:pointer; transition:background .15s,opacity .15s,transform .1s;}
  .chip:hover:not(.active), .fchip:hover:not(.active){background:var(--border2);}
  #postBtn:hover{opacity:.88;}
  #fab:hover{transform:scale(1.06);}
  .imgs img, .card.instagram .igimgs img{cursor:zoom-in;}
}
@media (min-width:860px){
  #topbar{padding:14px 24px 10px;}
  #main{max-width:900px; padding:20px 24px 90px;}
  #feed{display:block; column-count:2; column-gap:16px;}
  #feed .card{break-inside:avoid; margin-bottom:16px; display:inline-block; width:100%;}
  #composer{max-width:900px; margin:0 auto; padding:14px 24px; border-radius:0 0 14px 14px;}
  #fab{right:calc(50% - 450px + 16px);}
  .imgs.n1 img{max-height:520px;}
}
@media (min-width:1200px){
  #main, #composer{max-width:1080px;}
  #feed{column-count:3;}
  #fab{right:calc(50% - 540px + 16px);}
}

/* ---- 모바일 최적화 (작은 화면) ---- */
@media (max-width:400px){
  #topbar h1{font-size:13px;}
  #themeToggle, #charBtn{font-size:12px; padding:4px 8px;}
  .chip, .fchip{font-size:12px; padding:6px 11px;}
  #textInput{font-size:14px; min-height:46px;}
  #postBtn, #attachBtn{padding:8px 14px; font-size:12.5px;}
  .card{padding:10px 12px;}
  .card .text, .twtext, .igtext{font-size:13.5px;}
  .imgs.n1 img{max-height:340px;}
}
@supports (-webkit-touch-callout:none){
  #textInput, #timeInput, #overlay input, #charOverlay input{font-size:16px;} /* iOS 자동 확대 방지 */
}
</style>
</head>
<body>
<div id="topbar">
  <div class="titlerow">
    <h1 id="siteTitle">📖 연재소설</h1>
    <div class="topbtns">
      <button id="charBtn">👤 인물</button>
      <button id="themeToggle">🌙 다크</button>
    </div>
  </div>
  <div id="folderRow"><button class="chip add" id="newFolderBtn">+ 회차</button></div>
  <div id="typeFilterRow">
    <button class="fchip active" data-f="all">전체</button>
    <button class="fchip" data-f="text">텍스트</button>
    <button class="fchip" data-f="instagram">인스타</button>
    <button class="fchip" data-f="twitter">트윗</button>
    <button class="fchip" data-f="kakao">카카오톡</button>
    <button class="fchip" data-f="imessage">아이메시지</button>
  </div>
</div>

<div id="composer">
  <div id="typeRow">
    <button data-type="text" class="active">텍스트</button>
    <button data-type="instagram">인스타</button>
    <button data-type="twitter">트윗</button>
    <button data-type="kakao">카카오톡</button>
    <button data-type="imessage">아이메시지</button>
  </div>
  <div id="charRow"></div>
  <div id="posRow">
    <button class="chip active" data-p="left">왼쪽(상대)</button>
    <button class="chip" data-p="right">오른쪽(나)</button>
  </div>
  <textarea id="textInput" placeholder="내용을 입력... (#해시태그 사용 가능)"></textarea>
  <div id="preview"></div>
  <input type="datetime-local" id="timeInput" title="비워두면 현재 시간으로 업로드">
  <div class="composer-row">
    <label id="attachBtn">📎 사진<input type="file" id="fileInput" accept="image/*" multiple style="display:none"></label>
    <button id="postBtn">올리기</button>
  </div>
</div>

<div id="main">
  <div id="feed"></div>
  <div id="empty">회차를 선택하거나 새로 만들어보세요</div>
</div>

<button id="fab" style="display:none">✎</button>

<div id="overlay">
  <div class="sheet">
    <div class="mono" style="font-size:13px;color:var(--accent)" id="folderSheetTitle">새 회차</div>
    <input id="folderNumInput" type="number" placeholder="회차 번호 (예: 1)">
    <input id="folderNameInput" placeholder="회차 제목">
    <div class="row">
      <button class="cancel" id="folderCancel">취소</button>
      <button class="cancel" id="folderDelete" style="display:none;background:var(--danger);color:var(--danger-text)">삭제</button>
      <button class="ok" id="folderOk">만들기</button>
    </div>
  </div>
</div>

<div id="charOverlay">
  <div class="sheet">
    <div class="mono" style="font-size:13px;color:var(--accent)" id="charSheetTitle">등장인물 등록</div>
    <input id="charNameInput" placeholder="이름">
    <input id="charTwInput" placeholder="트위터 계정 (예: @handle)">
    <input id="charIgInput" placeholder="인스타 계정 (예: @handle)">
    <div class="row">
      <button class="cancel" id="charCancel">취소</button>
      <button class="cancel" id="charDelete" style="display:none;background:var(--danger);color:var(--danger-text)">삭제</button>
      <button class="ok" id="charOk">추가</button>
    </div>
    <div id="charList"></div>
  </div>
</div>

<div id="lightbox"><img id="lightboxImg"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, deleteDoc, updateDoc, doc,
  query, where, orderBy, onSnapshot, getDocs, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const CLOUDINARY_CLOUD = 'dbljkloal';
const CLOUDINARY_PRESET = 'Everything';

const firebaseConfig = {
  apiKey: "AIzaSyDdHBd1HFYnoMdQQWbMogwrtxKYUO4dcVY",
  authDomain: "promotion-de29c.firebaseapp.com",
  projectId: "promotion-de29c",
  storageBucket: "promotion-de29c.firebasestorage.app",
  messagingSenderId: "855775584555",
  appId: "1:855775584555:web:66aa308ad010873c1ee56e"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const foldersCol = collection(db, "chapters");
const postsCol = collection(db, "posts");
const charactersCol = collection(db, "characters");

let currentFolder = null, currentType = "text", pendingFiles = [];
let editingFolderId = null, editingCharId = null;
let currentViewFilter = "all";
let latestPosts = [];
let charactersMap = {};
let currentCharacterId = null;
let currentPosition = "left";

const TAG = { text: "텍스트", instagram: "인스타", twitter: "트윗", kakao: "카카오톡", imessage: "아이메시지" };
const NEEDS_CHAR = new Set(["instagram", "twitter", "kakao", "imessage"]);
const NEEDS_POS = new Set(["kakao", "imessage"]);

// site title
const siteTitle = document.getElementById("siteTitle");
siteTitle.textContent = localStorage.getItem("novel-title") || "📖 연재소설";
siteTitle.onclick = () => {
  const t = prompt("소설 제목을 입력하세요", siteTitle.textContent);
  if (t) { siteTitle.textContent = t; localStorage.setItem("novel-title", t); }
};

// theme
const themeBtn = document.getElementById("themeToggle");
function applyTheme(t){
  document.body.classList.toggle("light", t === "light");
  themeBtn.textContent = t === "light" ? "☀️ 화이트" : "🌙 다크";
  localStorage.setItem("archive-theme", t);
}
applyTheme(localStorage.getItem("archive-theme") || "dark");
themeBtn.onclick = () => applyTheme(document.body.classList.contains("light") ? "dark" : "light");

// type filter
document.querySelectorAll(".fchip").forEach(btn => {
  btn.onclick = () => {
    currentViewFilter = btn.dataset.f;
    document.querySelectorAll(".fchip").forEach(b => b.classList.toggle("active", b === btn));
    renderFeed();
  };
});

// ---- 회차(chapters) ----
onSnapshot(query(foldersCol, orderBy("num", "asc")), snap => {
  const row = document.getElementById("folderRow");
  row.innerHTML = "";
  const addBtn = document.createElement("button");
  addBtn.className = "chip add"; addBtn.id = "newFolderBtn"; addBtn.textContent = "+ 회차";
  addBtn.onclick = () => openFolderSheet();
  row.appendChild(addBtn);
  const arr = [];
  snap.forEach(d => arr.push({ id: d.id, ...d.data() }));
  arr.forEach(f => {
    const wrap = document.createElement("div"); wrap.className = "chipwrap";
    const chip = document.createElement("button");
    chip.className = "chip" + (currentFolder === f.id ? " active" : "");
    chip.textContent = (f.num ? f.num + "화" : "") + (f.name ? " " + f.name : "");
    chip.dataset.fid = f.id;
    chip.onclick = () => selectFolder(f.id, chip.textContent);
    const edit = document.createElement("button");
    edit.className = "chipedit"; edit.textContent = "⋯";
    edit.onclick = () => openFolderSheet(f.id, f.name, f.num);
    wrap.append(chip, edit);
    row.appendChild(wrap);
  });
  if (!currentFolder && arr.length) selectFolder(arr[0].id, "");
});

function openFolderSheet(id, name, num){
  editingFolderId = id || null;
  document.getElementById("folderSheetTitle").textContent = id ? "회차 수정" : "새 회차";
  document.getElementById("folderNumInput").value = num || "";
  document.getElementById("folderNameInput").value = name || "";
  document.getElementById("folderOk").textContent = id ? "저장" : "만들기";
  document.getElementById("folderDelete").style.display = id ? "block" : "none";
  document.getElementById("overlay").style.display = "flex";
  document.getElementById("folderNumInput").focus();
}
document.getElementById("folderCancel").onclick = () => document.getElementById("overlay").style.display = "none";
document.getElementById("overlay").onclick = e => { if (e.target.id === "overlay") e.currentTarget.style.display = "none"; };
document.getElementById("folderOk").onclick = async () => {
  const name = document.getElementById("folderNameInput").value.trim();
  const num = Number(document.getElementById("folderNumInput").value) || null;
  if (!name && !num) return;
  document.getElementById("overlay").style.display = "none";
  if (editingFolderId) {
    await updateDoc(doc(db, "chapters", editingFolderId), { name, num });
  } else {
    await addDoc(foldersCol, { name, num, createdAt: Date.now() });
  }
};
document.getElementById("folderDelete").onclick = async () => {
  if (!editingFolderId) return;
  if (!confirm("이 회차를 삭제할까요? 안의 글도 모두 삭제됩니다.")) return;
  document.getElementById("overlay").style.display = "none";
  const fid = editingFolderId;
  const snap = await getDocs(query(postsCol, where("folderId", "==", fid)));
  await Promise.all(snap.docs.map(d => deleteDoc(doc(db, "posts", d.id))));
  await deleteDoc(doc(db, "chapters", fid));
  if (currentFolder === fid) { currentFolder = null; document.getElementById("composer").style.display = "none"; document.getElementById("fab").style.display = "none"; document.getElementById("feed").innerHTML = ""; document.getElementById("empty").style.display = "block"; }
};

function selectFolder(id, label) {
  currentFolder = id;
  document.querySelectorAll("#folderRow .chip:not(.add)").forEach(el => el.classList.toggle("active", el.dataset.fid === id));
  document.getElementById("composer").style.display = "block";
  document.getElementById("fab").style.display = "block";
  loadPosts(id);
}

// ---- 등장인물 ----
onSnapshot(query(charactersCol, orderBy("createdAt", "desc")), snap => {
  charactersMap = {};
  snap.forEach(d => charactersMap[d.id] = { id: d.id, ...d.data() });
  renderCharChips();
  renderCharList();
  renderFeed();
});

function renderCharChips(){
  const row = document.getElementById("charRow");
  const prevSel = currentCharacterId;
  row.innerHTML = "";
  Object.values(charactersMap).forEach(c => {
    const chip = document.createElement("button");
    chip.className = "chip" + (prevSel === c.id ? " active" : "");
    chip.textContent = c.name;
    chip.onclick = () => {
      currentCharacterId = c.id;
      row.querySelectorAll(".chip").forEach(b => b.classList.toggle("active", b === chip));
    };
    row.appendChild(chip);
  });
  if (!Object.values(charactersMap).some(c => c.id === currentCharacterId)) currentCharacterId = null;
}

function renderCharList(){
  const list = document.getElementById("charList");
  list.innerHTML = "";
  Object.values(charactersMap).forEach(c => {
    const item = document.createElement("div");
    item.className = "charRowItem";
    item.innerHTML = `
      <div class="ci-av"></div>
      <div class="ci-info">
        <div class="ci-name">${escapeHtml(c.name || "")}</div>
        <div class="ci-handles">${escapeHtml(c.twitter || "")}${c.twitter && c.instagram ? " · " : ""}${escapeHtml(c.instagram || "")}</div>
      </div>
      <button data-a="edit">✎</button>
      <button data-a="del">삭제</button>
    `;
    item.querySelector('[data-a="edit"]').onclick = () => openCharSheet(c);
    item.querySelector('[data-a="del"]').onclick = async () => {
      if (confirm("이 인물을 삭제할까요?")) await deleteDoc(doc(db, "characters", c.id));
    };
    list.appendChild(item);
  });
}

document.getElementById("charBtn").onclick = () => openCharSheet();
function openCharSheet(c){
  editingCharId = c ? c.id : null;
  document.getElementById("charSheetTitle").textContent = c ? "인물 수정" : "등장인물 등록";
  document.getElementById("charNameInput").value = c ? c.name || "" : "";
  document.getElementById("charTwInput").value = c ? c.twitter || "" : "";
  document.getElementById("charIgInput").value = c ? c.instagram || "" : "";
  document.getElementById("charOk").textContent = c ? "저장" : "추가";
  document.getElementById("charDelete").style.display = c ? "block" : "none";
  document.getElementById("charOverlay").style.display = "flex";
  document.getElementById("charNameInput").focus();
}
document.getElementById("charCancel").onclick = () => document.getElementById("charOverlay").style.display = "none";
document.getElementById("charOverlay").onclick = e => { if (e.target.id === "charOverlay") e.currentTarget.style.display = "none"; };
document.getElementById("charOk").onclick = async () => {
  const name = document.getElementById("charNameInput").value.trim();
  const twitter = document.getElementById("charTwInput").value.trim();
  const instagram = document.getElementById("charIgInput").value.trim();
  if (!name) return;
  if (editingCharId) {
    await updateDoc(doc(db, "characters", editingCharId), { name, twitter, instagram });
  } else {
    await addDoc(charactersCol, { name, twitter, instagram, createdAt: Date.now() });
  }
  document.getElementById("charNameInput").value = "";
  document.getElementById("charTwInput").value = "";
  document.getElementById("charIgInput").value = "";
  editingCharId = null;
  document.getElementById("charSheetTitle").textContent = "등장인물 등록";
  document.getElementById("charOk").textContent = "추가";
  document.getElementById("charDelete").style.display = "none";
};
document.getElementById("charDelete").onclick = async () => {
  if (!editingCharId) return;
  if (!confirm("이 인물을 삭제할까요?")) return;
  await deleteDoc(doc(db, "characters", editingCharId));
  document.getElementById("charOverlay").style.display = "none";
};

document.getElementById("fab").onclick = () => {
  document.getElementById("composer").scrollIntoView({ behavior: "smooth" });
  document.getElementById("textInput").focus();
};

// ---- composer type/position ----
document.querySelectorAll("#typeRow button").forEach(btn => {
  btn.onclick = () => {
    currentType = btn.dataset.type;
    document.querySelectorAll("#typeRow button").forEach(b => b.classList.toggle("active", b === btn));
    document.getElementById("charRow").classList.toggle("show", NEEDS_CHAR.has(currentType));
    document.getElementById("posRow").classList.toggle("show", NEEDS_POS.has(currentType));
  };
});
document.querySelectorAll("#posRow [data-p]").forEach(btn => {
  btn.onclick = () => {
    currentPosition = btn.dataset.p;
    document.querySelectorAll("#posRow [data-p]").forEach(b => b.classList.toggle("active", b === btn));
  };
});

document.getElementById("fileInput").onchange = e => {
  pendingFiles = [...e.target.files];
  renderPreview();
};
function renderPreview(){
  const prev = document.getElementById("preview");
  prev.innerHTML = "";
  pendingFiles.forEach((f, i) => {
    const t = document.createElement("div"); t.className = "thumb";
    const img = document.createElement("img"); img.src = URL.createObjectURL(f);
    const rm = document.createElement("button"); rm.className = "rm"; rm.textContent = "×";
    rm.onclick = () => { pendingFiles.splice(i, 1); renderPreview(); };
    t.append(img, rm); prev.appendChild(t);
  });
}

async function uploadToCloudinary(file) {
  const fd = new FormData();
  fd.append("file", file);
  fd.append("upload_preset", CLOUDINARY_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, { method: "POST", body: fd });
  const data = await res.json();
  return data.secure_url;
}

document.getElementById("postBtn").onclick = async () => {
  if (!currentFolder) return;
  const text = document.getElementById("textInput").value.trim();
  const files = pendingFiles;
  if (!text && files.length === 0) return;
  const type = currentType;
  const btn = document.getElementById("postBtn");
  btn.disabled = true; btn.textContent = "업로드중...";

  try {
    const urls = files.length ? await Promise.all(files.map(uploadToCloudinary)) : [];
    const timeVal = document.getElementById("timeInput").value;
    const createdAt = timeVal ? new Date(timeVal).getTime() : Date.now();
    const characterId = NEEDS_CHAR.has(type) ? currentCharacterId : null;
    const position = NEEDS_POS.has(type) ? currentPosition : null;
    await addDoc(postsCol, { folderId: currentFolder, type, text, images: urls, createdAt, characterId, position });
    document.getElementById("textInput").value = "";
    document.getElementById("preview").innerHTML = "";
    document.getElementById("fileInput").value = "";
    document.getElementById("timeInput").value = "";
    pendingFiles = [];
  } catch (err) {
    alert("업로드 실패 - 다시 시도해주세요");
  }
  btn.disabled = false; btn.textContent = "올리기";
};

let unsub = null;
function loadPosts(folderId) {
  if (unsub) unsub();
  unsub = onSnapshot(query(postsCol, where("folderId", "==", folderId), orderBy("createdAt", "asc")), snap => {
    latestPosts = [];
    snap.forEach(d => latestPosts.push({ id: d.id, data: d.data() }));
    renderFeed();
  });
}

function renderFeed() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";
  const filtered = currentViewFilter === "all" ? latestPosts : latestPosts.filter(p => p.data.type === currentViewFilter);
  document.getElementById("empty").style.display = filtered.length ? "none" : "block";
  filtered.forEach(p => feed.appendChild(renderCard(p.id, p.data)));
}

function renderCard(id, p, pending) {
  const card = document.createElement("div");
  card.className = "card " + p.type + (pending ? " pending" : "");
  const date = p.createdAt ? new Date(p.createdAt).toLocaleString("ko-KR") : (pending ? "업로드 중..." : "");
  const n = p.images?.length || 0;
  const cls = n === 1 ? "n1" : n === 2 ? "n2" : n === 3 ? "n3" : "n4plus";
  const imgsHtml = n ? `<div class="imgs ${cls}">${p.images.map(u => `<img src="${u}" onclick="window.__openLb('${u}')">`).join("")}</div>` : "";
  const textHtml = p.text ? formatText(p.text) : "";
  const actions = pending ? "" : `<button class="delbtn" data-a="edit">수정</button><button class="delbtn" data-a="del">삭제</button>`;
  const character = p.characterId ? charactersMap[p.characterId] : null;

  if (p.type === "instagram") {
    const uname = character?.instagram || character?.name || "user";
    const igimgs = n ? `<div class="igimgs">${p.images.map(u => `<img src="${u}" onclick="window.__openLb('${u}')">`).join("")}</div>` : "";
    card.innerHTML = `
      <div class="ighead"><div class="av"></div><div class="uname">${escapeHtml(uname)}</div></div>
      ${igimgs}
      <div class="igfoot">
        <svg viewBox="0 0 24 24"><path d="M20.8 8.6c0-3-2.2-5.1-5-5.1-1.9 0-3.3 1-4.3 2.5C10.5 4.5 9.1 3.5 7.2 3.5c-2.8 0-5 2.1-5 5.1 0 4.6 5.4 8.6 9.3 11.7l.5.4.5-.4c3.9-3.1 9.3-7.1 9.3-11.7z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M3 12c0-4.4 4-8 9-8s9 3.6 9 8-4 8-9 8c-1.1 0-2.2-.2-3.2-.5L4 21l1.4-4.4C4.1 15.3 3 13.7 3 12z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4z"/></svg>
      </div>
      <div class="igbody"><div class="igtext">${textHtml ? `<b>${escapeHtml(uname)}</b>${textHtml}` : ""}</div></div>
      <div class="igmeta"><span class="mono">${date}</span><span>${actions}</span></div>
    `;
  } else if (p.type === "twitter") {
    const dispName = character?.name || "user";
    const handle = character?.twitter || "@user";
    card.innerHTML = `
      <div class="av"></div>
      <div class="twbody">
        <div class="twhead"><b>${escapeHtml(dispName)}</b><span class="mono">${escapeHtml(handle)} · ${date}</span></div>
        <div class="twtext">${textHtml}</div>
        ${imgsHtml}
        <div class="twmeta">${actions}</div>
      </div>
    `;
  } else if (p.type === "kakao" || p.type === "imessage") {
    const pos = p.position === "right" ? "right" : "left";
    const name = character?.name || "";
    card.innerHTML = `
      <div class="bubblerow ${pos}">
        <div class="b-av"></div>
        <div class="bubblecol">
          ${name && pos === "left" ? `<div class="b-name">${escapeHtml(name)}</div>` : ""}
          <div class="bubble">${textHtml}${imgsHtml}</div>
          <div class="b-meta"><span class="mono">${date}</span><span>${actions}</span></div>
        </div>
      </div>
    `;
  } else {
    card.innerHTML = `
      <div class="top"><span class="tag mono">${TAG[p.type] || p.type}</span><span class="date mono">${date}</span></div>
      <div class="text">${textHtml}</div>
      ${imgsHtml}
      ${actions}
    `;
  }

  if (!pending) {
    card.querySelectorAll('[data-a="del"]').forEach(b => b.onclick = async () => {
      if (confirm("삭제할까요?")) await deleteDoc(doc(db, "posts", id));
    });
    card.querySelectorAll('[data-a="edit"]').forEach(b => b.onclick = () => startEdit(card, id, p));
  }
  return card;
}

function startEdit(card, id, p) {
  let newType = p.type;
  const textEl = card.querySelector(".text, .igtext, .twtext, .bubble");
  const ta = document.createElement("textarea");
  ta.className = "editta";
  ta.value = p.text || "";
  textEl.replaceWith(ta);
  ta.focus();

  const typeRow = document.createElement("div");
  typeRow.className = "typeSwitchRow";
  typeRow.innerHTML = Object.entries(TAG).map(([k, v]) =>
    `<button data-t="${k}" class="${k === p.type ? "active" : ""}">${v}</button>`).join("");
  ta.insertAdjacentElement("beforebegin", typeRow);
  typeRow.querySelectorAll("button").forEach(b => b.onclick = () => {
    newType = b.dataset.t;
    typeRow.querySelectorAll("button").forEach(x => x.classList.toggle("active", x === b));
  });

  const timeEl = document.createElement("input");
  timeEl.type = "datetime-local"; timeEl.className = "editta";
  timeEl.value = toLocalInputValue(p.createdAt);
  typeRow.insertAdjacentElement("afterend", timeEl);

  const btnRow = document.createElement("div");
  btnRow.innerHTML = `<button class="delbtn" data-a="save">저장</button><button class="delbtn" data-a="cancel">취소</button>`;
  ta.insertAdjacentElement("afterend", btnRow);
  card.querySelectorAll('[data-a="edit"],[data-a="del"]').forEach(b => b.style.display = "none");
  btnRow.querySelector('[data-a="save"]').onclick = async () => {
    const createdAt = timeEl.value ? new Date(timeEl.value).getTime() : p.createdAt;
    await updateDoc(doc(db, "posts", id), { text: ta.value.trim(), type: newType, createdAt });
  };
  btnRow.querySelector('[data-a="cancel"]').onclick = () => renderFeed();
}

function toLocalInputValue(ts) {
  const d = new Date(ts || Date.now());
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0, 16);
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function formatText(s) {
  const esc = escapeHtml(s);
  return esc.replace(/(^|\s)(#[^\s#<]+)/g, (m, p1, p2) => p1 + '<span class="hashtag">' + p2 + '</span>');
}

window.__openLb = url => {
  document.getElementById("lightboxImg").src = url;
  document.getElementById("lightbox").style.display = "flex";
};
document.getElementById("lightbox").onclick = () => document.getElementById("lightbox").style.display = "none";
</script>
