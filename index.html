<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>연재</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

:root{
  --bg:#141210; --bg2:#1c1916; --bg3:#252119; --bg4:#2a2620; --bg0:#0e0c0a;
  --border:#3a332a; --border2:#2a2620; --borderdark:#221f1a;
  --text:#eee7d8; --text-dim:#d8cba8; --text-dim2:#c9c0ac; --text-mut:#a89a7d;
  --text-faint:#7a7264; --text-faint2:#6a6254; --text-faint3:#5a5346; --text-faint4:#8a8064;
  --accent:#c9a875; --accent-text:#141210;
  --danger:#a8332b; --danger-text:#fff;
  --hashtag:#5b9dd9;
  --kakao-bubble:#f5e14a; --kakao-text:#3c1e1e;
  --im-blue:#0b84ff; --im-gray:#2f2f31; --im-gray-text:#eee7d8;
}
body.light{
  --bg:#f7f5ef; --bg2:#ffffff; --bg3:#f1eee5; --bg4:#e9e4d6; --bg0:#e2dbc8;
  --border:#ddd5c2; --border2:#e6e0d1; --borderdark:#d3cbb6;
  --text:#2b2620; --text-dim:#4d4433; --text-dim2:#3f382a; --text-mut:#6b5f47;
  --text-faint:#8c8168; --text-faint2:#a49877; --text-faint3:#8c8168; --text-faint4:#7a6f56;
  --accent:#a8823f; --accent-text:#ffffff;
  --danger:#c1453a; --danger-text:#fff;
  --hashtag:#1d6fc9;
  --im-gray:#e5e5ea; --im-gray-text:#1c1c1e;
}

*{box-sizing:border-box; margin:0; padding:0; touch-action:manipulation; -webkit-tap-highlight-color:transparent; letter-spacing:-0.02em;}
html,body{width:100%; height:100%; overflow-x:hidden; overflow-y:auto;}
body{
  background:var(--bg); color:var(--text); font-family:'Pretendard',sans-serif;
  min-height:100vh; min-height:100dvh; overscroll-behavior-y:auto;
  transition:background .2s,color .2s;
}
h1{font-weight:700;}
.mono{font-family:'Pretendard',sans-serif; font-weight:600;}
button, input, textarea{font-family:inherit;}
.hashtag{color:var(--hashtag); font-weight:600;}

#topbar{position:sticky; top:0; z-index:20; background:var(--bg2); border-bottom:1px solid var(--border); padding:10px 12px 8px;}
#topbar .titlerow{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; gap:8px;}
#topbar h1{font-family:'Pretendard',sans-serif; font-weight:800; font-size:14px; color:var(--accent); cursor:pointer;}
.topbtns{display:flex; gap:6px; flex:0 0 auto;}
#charBtn, #themeToggle{background:none; border:1px solid var(--border); color:var(--text-dim); border-radius:16px; padding:5px 10px; font-size:12.5px;}
#folderRow{display:flex; gap:6px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:2px;}
#folderRow::-webkit-scrollbar{display:none;}
.chip{
  flex:0 0 auto; font-size:13px; padding:7px 13px; border-radius:16px; background:var(--bg4);
  color:var(--text-dim); white-space:nowrap; border:1px solid var(--border);
}
.chip.active{background:var(--accent); color:var(--accent-text); font-weight:700; border-color:var(--accent);}
.chip.add{background:none; border:1px dashed var(--text-faint3); color:var(--accent);}
.chipwrap{display:flex; flex:0 0 auto;}
.chipwrap .chip{border-radius:16px 0 0 16px;}
.chipedit{flex:0 0 auto; font-size:11px; padding:7px 9px; border-radius:0 16px 16px 0; background:var(--bg4); color:var(--text-faint4); border:1px solid var(--border); border-left:1px solid var(--borderdark);}
.chipwrap .chip.active + .chipedit{background:var(--accent); color:var(--accent-text); border-color:var(--accent);}

#main{padding:16px 14px 120px; max-width:640px; margin:0 auto;}
#editor{min-height:78vh; outline:none; font-size:16px; line-height:1.9; word-break:break-word;}
#editor:empty:before{content:attr(data-ph); color:var(--text-faint3);}
#editor img{max-width:100%; border-radius:10px; display:block; margin:12px 0;}
#empty{text-align:center; color:var(--text-faint2); font-size:13px; margin-top:60px;}

.embed{position:relative; margin:16px 0;}
.embed .embed-del{position:absolute; top:-8px; right:-8px; width:22px; height:22px; border-radius:50%; background:var(--danger); color:var(--danger-text); border:none; font-size:12px; line-height:22px; opacity:0; transition:opacity .15s; z-index:2;}
.embed:hover .embed-del{opacity:1;}

#editor hr.divider{border:none; border-top:1px solid var(--border); margin:26px 0;}
.imgs{display:grid; gap:3px; border-radius:10px; overflow:hidden; margin:8px 0;}
.imgs img{width:100%; object-fit:cover; display:block; margin:0;}
.imgs.n1 img{max-height:460px;}
.imgs.n2{grid-template-columns:1fr 1fr;} .imgs.n2 img{height:170px;}
.imgs.n3{grid-template-columns:1fr 1fr;} .imgs.n3 img:first-child{grid-row:span 2; height:100%;} .imgs.n3 img{height:110px;}
.imgs.n4plus{grid-template-columns:1fr 1fr;} .imgs.n4plus img{height:120px;}

#overlay, #charOverlay, #blockSheet{display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:40; align-items:flex-end;}
#overlay .sheet, #charOverlay .sheet, #blockSheet .sheet{background:var(--bg2); width:100%; padding:18px 16px calc(18px + env(safe-area-inset-bottom)); border-radius:16px 16px 0 0; max-height:85vh; overflow-y:auto;}
#overlay input, #charOverlay input, #blockSheet textarea{width:100%; background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:11px; border-radius:10px; font-size:15px; margin:10px 0;}
#blockSheet textarea{min-height:70px; resize:vertical; line-height:1.6;}
#overlay .row, #charOverlay .row, #blockSheet .row{display:flex; gap:8px;}
#overlay button, #charOverlay button, #blockSheet button{padding:11px; border-radius:10px; border:none; font-size:14px;}
#overlay .row button, #charOverlay .row button, #blockSheet .row button{flex:1;}
#overlay .cancel, #charOverlay .cancel, #blockSheet .cancel{background:var(--bg4); color:var(--text-dim2);}
#overlay .ok, #charOverlay .ok, #blockSheet .ok{background:var(--accent); color:var(--accent-text); font-weight:700;}
#charList{margin-top:12px; border-top:1px solid var(--border2); padding-top:10px; display:flex; flex-direction:column; gap:6px;}
.charRowItem{display:flex; align-items:center; gap:8px; padding:8px 10px; background:var(--bg3); border-radius:10px;}
.charRowItem .ci-av{width:28px; height:28px; border-radius:50%; background:var(--accent); flex:0 0 auto;}
.charRowItem .ci-info{flex:1; min-width:0;}
.charRowItem .ci-name{font-size:13.5px; font-weight:700;}
.charRowItem .ci-handles{font-size:11px; color:var(--text-faint);}
.charRowItem button{background:none; border:none; color:var(--text-faint3); font-size:12px; padding:4px 6px;}
.pillrow{display:flex; gap:6px; flex-wrap:wrap; margin:6px 0;}
.pillrow button{flex:1 1 18%; font-size:11px; padding:7px 0; border-radius:8px; background:var(--bg4); color:var(--text-mut); border:none;}
.pillrow button.active{background:var(--danger); color:var(--danger-text); font-weight:700;}
#blockPreview{display:flex; gap:6px; overflow-x:auto; margin:6px 0;}
#blockPreview .thumb{position:relative; flex:0 0 auto;}
#blockPreview img{width:52px; height:52px; object-fit:cover; border-radius:8px;}
#blockPreview .rm{position:absolute; top:-5px; right:-5px; background:var(--danger); color:var(--danger-text); border-radius:50%; width:18px; height:18px; font-size:11px; border:none; line-height:18px;}
.attachbtn{background:none; border:1px solid var(--border); color:var(--text-dim); padding:7px 12px; border-radius:8px; font-size:12.5px; display:inline-block; margin-top:2px;}

#fab{position:fixed; right:18px; bottom:24px; display:none; flex-direction:column; gap:10px; z-index:15;}
#fab button{width:48px; height:48px; border-radius:50%; background:var(--accent); color:var(--accent-text); border:none; font-size:19px; box-shadow:0 3px 10px rgba(0,0,0,.35);}
#fab #fabBlock{background:var(--bg3); color:var(--text-dim); border:1px solid var(--border);}

#lightbox{display:none; position:fixed; inset:0; background:rgba(0,0,0,.94); z-index:50; align-items:center; justify-content:center;}
#lightbox img{max-width:94vw; max-height:94vh; object-fit:contain;}

.block.instagram{padding:0; overflow:hidden; border:1px solid var(--border2); border-radius:12px; background:var(--bg3);}
.block.instagram .ighead{display:flex; align-items:center; gap:8px; padding:10px 12px;}
.block.instagram .av{width:30px; height:30px; border-radius:50%; background:linear-gradient(45deg,#feda75,#d62976,#4f5bd5); background-size:cover; background-position:center; flex:0 0 auto;}
.block.instagram .uname{font-weight:700; font-size:13px; color:var(--text);}
.block.instagram .igimgs img{width:100%; display:block; max-height:480px; object-fit:cover; margin:0;}
.block.instagram .igfoot{display:flex; gap:14px; padding:10px 12px 0;}
.block.instagram .igfoot svg{width:23px; height:23px; stroke:var(--text); fill:none; stroke-width:1.8;}
.block.instagram .igbody{padding:6px 12px 12px;}
.block.instagram .igtext{font-size:13.5px; line-height:1.5; white-space:pre-wrap;}
.block.instagram .igtext b{margin-right:6px;}

.block.twitter{display:flex; gap:10px; padding:12px 14px; border:1px solid var(--border2); border-radius:12px; background:var(--bg3);}
.block.twitter .av{width:38px; height:38px; border-radius:50%; background:#1d9bf0; background-size:cover; background-position:center; flex:0 0 auto;}
.block.twitter .twbody{flex:1; min-width:0;}
.block.twitter .twhead{font-size:14px;}
.block.twitter .twhead b{color:var(--text);}
.block.twitter .twhead span{color:var(--text-faint); margin-left:4px;}
.block.twitter .twtext{font-size:14.5px; line-height:1.45; margin:3px 0 4px; white-space:pre-wrap;}
.block.twitter .imgs{border-radius:14px; border:1px solid var(--border2);}

.bubblerow{display:flex; align-items:flex-end; gap:8px;}
.bubblerow.right{flex-direction:row-reverse;}
.bubblecol{display:flex; flex-direction:column; max-width:78%;}
.bubblerow.right .bubblecol{align-items:flex-end;}
.b-name{font-size:11px; color:var(--text-faint); margin-bottom:3px;}
.bubble{padding:9px 13px; border-radius:16px; font-size:14px; line-height:1.45; white-space:pre-wrap; word-break:break-word;}
.block.kakao .bubblerow:not(.right) .bubble{background:var(--bg3); color:var(--text); border:1px solid var(--border2); border-bottom-left-radius:4px;}
.block.kakao .bubblerow.right .bubble{background:var(--kakao-bubble); color:var(--kakao-text); border-bottom-right-radius:4px;}
.block.imessage .bubblerow:not(.right) .bubble{background:var(--im-gray); color:var(--im-gray-text); border-bottom-left-radius:4px;}
.block.imessage .bubblerow.right .bubble{background:var(--im-blue); color:#fff; border-bottom-right-radius:4px;}
.bubble .imgs{margin-top:4px; border-radius:12px;}

@media (hover:hover) and (pointer:fine){
  .chip, #themeToggle, #charBtn, .chipedit, #fab button, .embed-del{cursor:pointer; transition:background .15s,opacity .15s;}
  .chip:hover:not(.active){background:var(--border2);}
  #editor img{cursor:zoom-in;}
}
@media (min-width:860px){
  #topbar{padding:14px 24px 10px;}
  #main{max-width:720px; padding:22px 24px 120px;}
}
@media (max-width:400px){
  #topbar h1{font-size:13px;}
  #themeToggle, #charBtn{font-size:12px; padding:4px 8px;}
  .chip{font-size:12px; padding:6px 11px;}
  #editor{font-size:15px;}
}
@supports (-webkit-touch-callout:none){
  #editor, #overlay input, #charOverlay input, #blockSheet textarea{font-size:16px;} /* iOS 자동 확대 방지 */
}
</style>
</head>
<body>
<div id="topbar">
  <div class="titlerow">
    <h1 id="siteTitle">📖 연재소설</h1>
    <div class="topbtns">
      <button id="charBtn">👤 인물</button>
      <button id="themeToggle">🌙 다크</button>
    </div>
  </div>
  <div id="folderRow"><button class="chip add" id="newFolderBtn">+ 회차</button></div>
</div>

<div id="main">
  <div id="editor" contenteditable="true" spellcheck="false" data-ph="이어서 써내려가세요..." style="display:none"></div>
  <div id="empty">회차를 선택하거나 새로 만들어보세요</div>
</div>

<div id="fab">
  <button id="fabDivider" title="구분선 삽입">―</button>
  <button id="fabBlock" title="대화/SNS 삽입">💬</button>
  <button id="fabImg" title="이미지 삽입">📷</button>
</div>
<input type="file" id="imgFileInput" accept="image/*" multiple style="display:none">

<div id="overlay">
  <div class="sheet">
    <div class="mono" style="font-size:13px;color:var(--accent)" id="folderSheetTitle">새 회차</div>
    <input id="folderNumInput" type="number" placeholder="회차 번호 (예: 1)">
    <input id="folderNameInput" placeholder="회차 제목">
    <div class="row">
      <button class="cancel" id="folderCancel">취소</button>
      <button class="cancel" id="folderDelete" style="display:none;background:var(--danger);color:var(--danger-text)">삭제</button>
      <button class="ok" id="folderOk">만들기</button>
    </div>
  </div>
</div>

<div id="charOverlay">
  <div class="sheet">
    <div class="mono" style="font-size:13px;color:var(--accent)" id="charSheetTitle">등장인물 등록</div>
    <input id="charNameInput" placeholder="이름">
    <input id="charTwInput" placeholder="트위터 계정 (예: @handle)">
    <input id="charIgInput" placeholder="인스타 계정 (예: @handle)">
    <div style="display:flex; align-items:center; gap:10px; margin:10px 0;">
      <img id="charAvatarPreview" style="width:44px;height:44px;border-radius:50%;object-fit:cover;background:var(--bg4);display:none;">
      <label class="attachbtn" style="margin:0">📎 프로필 사진<input type="file" id="charAvatarInput" accept="image/*" style="display:none"></label>
    </div>
    <div class="row">
      <button class="cancel" id="charCancel">취소</button>
      <button class="cancel" id="charDelete" style="display:none;background:var(--danger);color:var(--danger-text)">삭제</button>
      <button class="ok" id="charOk">추가</button>
    </div>
    <div id="charList"></div>
  </div>
</div>

<div id="blockSheet">
  <div class="sheet">
    <div class="mono" style="font-size:13px;color:var(--accent)">삽입하기</div>
    <div class="pillrow" id="blockTypeRow">
      <button data-t="instagram" class="active">인스타</button>
      <button data-t="twitter">트윗</button>
      <button data-t="kakao">카카오톡</button>
      <button data-t="imessage">아이메시지</button>
    </div>
    <div class="pillrow" id="blockCharRow"></div>
    <div class="pillrow" id="blockPosRow" style="display:none">
      <button data-p="left" class="active">왼쪽(상대)</button>
      <button data-p="right">오른쪽(나)</button>
    </div>
    <textarea id="blockText" placeholder="내용 입력 (#해시태그 가능)"></textarea>
    <label class="attachbtn">📎 이미지 추가<input type="file" id="blockFileInput" accept="image/*" multiple style="display:none"></label>
    <div id="blockPreview"></div>
    <div class="row">
      <button class="cancel" id="blockCancel">닫기</button>
      <button class="ok" id="blockInsertBtn">삽입</button>
    </div>
  </div>
</div>

<div id="lightbox"><img id="lightboxImg"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, deleteDoc, updateDoc, doc,
  query, orderBy, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const CLOUDINARY_CLOUD = 'dbljkloal';
const CLOUDINARY_PRESET = 'Everything';

const firebaseConfig = {
  apiKey: "AIzaSyDdHBd1HFYnoMdQQWbMogwrtxKYUO4dcVY",
  authDomain: "promotion-de29c.firebaseapp.com",
  projectId: "promotion-de29c",
  storageBucket: "promotion-de29c.firebasestorage.app",
  messagingSenderId: "855775584555",
  appId: "1:855775584555:web:66aa308ad010873c1ee56e"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const foldersCol = collection(db, "chapters");
const charactersCol = collection(db, "characters");

let currentFolder = null, editingFolderId = null, editingCharId = null;
let charactersMap = {};
let chapterUnsub = null;
let savedRange = null;
let saveTimer = null;
let blockType = "instagram", blockCharId = null, blockPosition = "left", blockPending = [];
let charAvatarFile = null, charAvatarExisting = "";

const NEEDS_CHAR = new Set(["instagram", "twitter", "kakao", "imessage"]);
const NEEDS_POS = new Set(["kakao", "imessage"]);

const editor = document.getElementById("editor");
const emptyEl = document.getElementById("empty");
const fab = document.getElementById("fab");

// site title
const siteTitle = document.getElementById("siteTitle");
siteTitle.textContent = localStorage.getItem("novel-title") || "📖 연재소설";
siteTitle.onclick = () => {
  const t = prompt("소설 제목을 입력하세요", siteTitle.textContent);
  if (t) { siteTitle.textContent = t; localStorage.setItem("novel-title", t); }
};

// theme
const themeBtn = document.getElementById("themeToggle");
function applyTheme(t){
  document.body.classList.toggle("light", t === "light");
  themeBtn.textContent = t === "light" ? "☀️ 화이트" : "🌙 다크";
  localStorage.setItem("archive-theme", t);
}
applyTheme(localStorage.getItem("archive-theme") || "dark");
themeBtn.onclick = () => applyTheme(document.body.classList.contains("light") ? "dark" : "light");

// ---- 회차(chapters) ----
onSnapshot(query(foldersCol, orderBy("num", "asc")), snap => {
  const row = document.getElementById("folderRow");
  row.innerHTML = "";
  const addBtn = document.createElement("button");
  addBtn.className = "chip add"; addBtn.id = "newFolderBtn"; addBtn.textContent = "+ 회차";
  addBtn.onclick = () => openFolderSheet();
  row.appendChild(addBtn);
  const arr = [];
  snap.forEach(d => arr.push({ id: d.id, ...d.data() }));
  arr.forEach(f => {
    const wrap = document.createElement("div"); wrap.className = "chipwrap";
    const chip = document.createElement("button");
    chip.className = "chip" + (currentFolder === f.id ? " active" : "");
    chip.textContent = (f.num ? f.num + "화" : "") + (f.name ? " " + f.name : "");
    chip.dataset.fid = f.id;
    chip.onclick = () => selectFolder(f.id);
    const edit = document.createElement("button");
    edit.className = "chipedit"; edit.textContent = "⋯";
    edit.onclick = () => openFolderSheet(f.id, f.name, f.num);
    wrap.append(chip, edit);
    row.appendChild(wrap);
  });
  if (!currentFolder && arr.length) selectFolder(arr[0].id);
});

function openFolderSheet(id, name, num){
  editingFolderId = id || null;
  document.getElementById("folderSheetTitle").textContent = id ? "회차 수정" : "새 회차";
  document.getElementById("folderNumInput").value = num || "";
  document.getElementById("folderNameInput").value = name || "";
  document.getElementById("folderOk").textContent = id ? "저장" : "만들기";
  document.getElementById("folderDelete").style.display = id ? "block" : "none";
  document.getElementById("overlay").style.display = "flex";
  document.getElementById("folderNumInput").focus();
}
document.getElementById("folderCancel").onclick = () => document.getElementById("overlay").style.display = "none";
document.getElementById("overlay").onclick = e => { if (e.target.id === "overlay") e.currentTarget.style.display = "none"; };
document.getElementById("folderOk").onclick = async () => {
  const name = document.getElementById("folderNameInput").value.trim();
  const num = Number(document.getElementById("folderNumInput").value) || null;
  if (!name && !num) return;
  document.getElementById("overlay").style.display = "none";
  if (editingFolderId) {
    await updateDoc(doc(db, "chapters", editingFolderId), { name, num });
  } else {
    await addDoc(foldersCol, { name, num, content: "", createdAt: Date.now() });
  }
};
document.getElementById("folderDelete").onclick = async () => {
  if (!editingFolderId) return;
  if (!confirm("이 회차를 삭제할까요?")) return;
  document.getElementById("overlay").style.display = "none";
  const fid = editingFolderId;
  await deleteDoc(doc(db, "chapters", fid));
  if (currentFolder === fid) {
    currentFolder = null;
    if (chapterUnsub) chapterUnsub();
    editor.innerHTML = ""; editor.style.display = "none";
    fab.style.display = "none";
    emptyEl.style.display = "block";
  }
};

function selectFolder(id) {
  currentFolder = id;
  document.querySelectorAll("#folderRow .chip:not(.add)").forEach(el => el.classList.toggle("active", el.dataset.fid === id));
  emptyEl.style.display = "none";
  editor.style.display = "block";
  fab.style.display = "flex";
  if (chapterUnsub) chapterUnsub();
  chapterUnsub = onSnapshot(doc(db, "chapters", id), snap => {
    if (document.activeElement === editor) return;
    const data = snap.data();
    editor.innerHTML = (data && data.content) || "";
  });
}

// ---- 등장인물 ----
onSnapshot(query(charactersCol, orderBy("createdAt", "desc")), snap => {
  charactersMap = {};
  snap.forEach(d => charactersMap[d.id] = { id: d.id, ...d.data() });
  renderCharList();
  buildBlockCharRow();
});

function renderCharList(){
  const list = document.getElementById("charList");
  list.innerHTML = "";
  Object.values(charactersMap).forEach(c => {
    const item = document.createElement("div");
    item.className = "charRowItem";
    item.innerHTML = `
      <div class="ci-av"></div>
      <div class="ci-info">
        <div class="ci-name">${escapeHtml(c.name || "")}</div>
        <div class="ci-handles">${escapeHtml(c.twitter || "")}${c.twitter && c.instagram ? " · " : ""}${escapeHtml(c.instagram || "")}</div>
      </div>
      <button data-a="edit">✎</button>
      <button data-a="del">삭제</button>
    `;
    item.querySelector('[data-a="edit"]').onclick = () => openCharSheet(c);
    item.querySelector('[data-a="del"]').onclick = async () => {
      if (confirm("이 인물을 삭제할까요?")) await deleteDoc(doc(db, "characters", c.id));
    };
    list.appendChild(item);
  });
}

document.getElementById("charBtn").onclick = () => openCharSheet();
function openCharSheet(c){
  editingCharId = c ? c.id : null;
  document.getElementById("charSheetTitle").textContent = c ? "인물 수정" : "등장인물 등록";
  document.getElementById("charNameInput").value = c ? c.name || "" : "";
  document.getElementById("charTwInput").value = c ? c.twitter || "" : "";
  document.getElementById("charIgInput").value = c ? c.instagram || "" : "";
  document.getElementById("charOk").textContent = c ? "저장" : "추가";
  document.getElementById("charDelete").style.display = c ? "block" : "none";
  charAvatarFile = null;
  charAvatarExisting = c ? (c.avatar || "") : "";
  const prevEl = document.getElementById("charAvatarPreview");
  prevEl.src = charAvatarExisting;
  prevEl.style.display = charAvatarExisting ? "block" : "none";
  document.getElementById("charAvatarInput").value = "";
  document.getElementById("charOverlay").style.display = "flex";
  document.getElementById("charNameInput").focus();
}
document.getElementById("charAvatarInput").onchange = e => {
  const f = e.target.files[0];
  if (!f) return;
  charAvatarFile = f;
  const prevEl = document.getElementById("charAvatarPreview");
  prevEl.src = URL.createObjectURL(f);
  prevEl.style.display = "block";
};
document.getElementById("charCancel").onclick = () => document.getElementById("charOverlay").style.display = "none";
document.getElementById("charOverlay").onclick = e => { if (e.target.id === "charOverlay") e.currentTarget.style.display = "none"; };
document.getElementById("charOk").onclick = async () => {
  const name = document.getElementById("charNameInput").value.trim();
  const twitter = document.getElementById("charTwInput").value.trim();
  const instagram = document.getElementById("charIgInput").value.trim();
  if (!name) return;
  const okBtn = document.getElementById("charOk");
  okBtn.disabled = true;
  let avatar = charAvatarExisting;
  if (charAvatarFile) {
    try { avatar = await uploadToCloudinary(charAvatarFile); } catch (e) { alert("프로필 사진 업로드 실패"); }
  }
  if (editingCharId) {
    await updateDoc(doc(db, "characters", editingCharId), { name, twitter, instagram, avatar });
  } else {
    await addDoc(charactersCol, { name, twitter, instagram, avatar, createdAt: Date.now() });
  }
  okBtn.disabled = false;
  document.getElementById("charOverlay").style.display = "none";
  editingCharId = null;
};
document.getElementById("charDelete").onclick = async () => {
  if (!editingCharId) return;
  if (!confirm("이 인물을 삭제할까요?")) return;
  await deleteDoc(doc(db, "characters", editingCharId));
  document.getElementById("charOverlay").style.display = "none";
};

// ---- 에디터: 커서 위치 기억 + 삽입 ----
document.addEventListener("selectionchange", () => {
  const sel = window.getSelection();
  if (sel.rangeCount && editor.contains(sel.anchorNode)) {
    savedRange = sel.getRangeAt(0).cloneRange();
  }
});

function insertAtCursor(html){
  editor.focus();
  const sel = window.getSelection();
  sel.removeAllRanges();
  if (savedRange && editor.contains(savedRange.startContainer)) {
    sel.addRange(savedRange);
  } else {
    const r = document.createRange();
    r.selectNodeContents(editor);
    r.collapse(false);
    sel.addRange(r);
  }
  document.execCommand("insertHTML", false, html);
  saveContent();
}

editor.addEventListener("input", () => {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveContent, 500);
});
function saveContent(){
  if (!currentFolder) return;
  updateDoc(doc(db, "chapters", currentFolder), { content: editor.innerHTML });
}

editor.addEventListener("click", e => {
  const del = e.target.closest(".embed-del");
  if (del) { del.closest(".embed").remove(); saveContent(); return; }
  if (e.target.tagName === "IMG") {
    document.getElementById("lightboxImg").src = e.target.src;
    document.getElementById("lightbox").style.display = "flex";
  }
});
document.getElementById("lightbox").onclick = () => document.getElementById("lightbox").style.display = "none";

async function uploadToCloudinary(file) {
  const fd = new FormData();
  fd.append("file", file);
  fd.append("upload_preset", CLOUDINARY_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, { method: "POST", body: fd });
  const data = await res.json();
  return data.secure_url;
}

document.getElementById("fabDivider").onclick = () => {
  if (!currentFolder) return;
  insertAtCursor('<hr class="divider">' + "<p><br></p>");
};

document.getElementById("fabImg").onclick = () => document.getElementById("imgFileInput").click();
document.getElementById("imgFileInput").onchange = async e => {
  const files = [...e.target.files]; e.target.value = "";
  if (!files.length || !currentFolder) return;
  const urls = await Promise.all(files.map(uploadToCloudinary));
  insertAtCursor(urls.map(u => `<img src="${u}">`).join(""));
};

// ---- 대화/SNS 블록 삽입 시트 ----
document.getElementById("fabBlock").onclick = () => {
  if (!currentFolder) return;
  document.getElementById("blockText").value = "";
  blockPending = [];
  renderBlockPreview();
  blockType = "instagram"; blockPosition = "left";
  document.querySelectorAll("#blockTypeRow button").forEach(b => b.classList.toggle("active", b.dataset.t === blockType));
  updateBlockExtra();
  document.getElementById("blockSheet").style.display = "flex";
};
document.getElementById("blockCancel").onclick = () => document.getElementById("blockSheet").style.display = "none";
document.getElementById("blockSheet").onclick = e => { if (e.target.id === "blockSheet") e.currentTarget.style.display = "none"; };

document.querySelectorAll("#blockTypeRow button").forEach(btn => {
  btn.onclick = () => {
    blockType = btn.dataset.t;
    document.querySelectorAll("#blockTypeRow button").forEach(b => b.classList.toggle("active", b === btn));
    updateBlockExtra();
  };
});
function updateBlockExtra(){
  document.getElementById("blockCharRow").style.display = NEEDS_CHAR.has(blockType) ? "flex" : "none";
  document.getElementById("blockPosRow").style.display = NEEDS_POS.has(blockType) ? "flex" : "none";
}
function buildBlockCharRow(){
  const row = document.getElementById("blockCharRow");
  row.innerHTML = "";
  Object.values(charactersMap).forEach(c => {
    const b = document.createElement("button");
    b.className = "chip" + (blockCharId === c.id ? " active" : "");
    b.textContent = c.name;
    b.onclick = () => { blockCharId = c.id; buildBlockCharRow(); };
    row.appendChild(b);
  });
}
document.querySelectorAll("#blockPosRow button").forEach(btn => {
  btn.onclick = () => {
    blockPosition = btn.dataset.p;
    document.querySelectorAll("#blockPosRow button").forEach(b => b.classList.toggle("active", b === btn));
  };
});
document.getElementById("blockFileInput").onchange = e => {
  blockPending = [...e.target.files];
  renderBlockPreview();
};
function renderBlockPreview(){
  const prev = document.getElementById("blockPreview");
  prev.innerHTML = "";
  blockPending.forEach((f, i) => {
    const t = document.createElement("div"); t.className = "thumb";
    const img = document.createElement("img"); img.src = URL.createObjectURL(f);
    const rm = document.createElement("button"); rm.className = "rm"; rm.textContent = "×";
    rm.onclick = () => { blockPending.splice(i, 1); renderBlockPreview(); };
    t.append(img, rm); prev.appendChild(t);
  });
}

document.getElementById("blockInsertBtn").onclick = async () => {
  const text = document.getElementById("blockText").value.trim();
  const files = blockPending;
  if (!text && !files.length) return;
  const btn = document.getElementById("blockInsertBtn");
  btn.disabled = true; btn.textContent = "삽입중...";
  try {
    const urls = files.length ? await Promise.all(files.map(uploadToCloudinary)) : [];
    const html = buildEmbedHTML(blockType, text, urls, blockCharId, blockPosition);
    insertAtCursor(html + "<p><br></p>");
    document.getElementById("blockText").value = "";
    blockPending = [];
    renderBlockPreview();
    document.getElementById("blockText").focus();
    if (blockPosition === "left") { blockPosition = "right"; } else { blockPosition = "left"; }
    document.querySelectorAll("#blockPosRow button").forEach(b => b.classList.toggle("active", b.dataset.p === blockPosition));
  } catch (err) {
    alert("업로드 실패 - 다시 시도해주세요");
  }
  btn.disabled = false; btn.textContent = "삽입";
};

function buildEmbedHTML(type, text, images, charId, position){
  const character = charId ? charactersMap[charId] : null;
  const n = images.length;
  const cls = n === 1 ? "n1" : n === 2 ? "n2" : n === 3 ? "n3" : "n4plus";
  const imgsHtml = n ? `<div class="imgs ${cls}">${images.map(u => `<img src="${u}">`).join("")}</div>` : "";
  const textHtml = text ? formatText(text) : "";

  const avStyle = character?.avatar ? ` style="background-image:url('${character.avatar.replace(/'/g, "%27")}')"` : "";

  if (type === "instagram") {
    const uname = character?.instagram || character?.name || "user";
    const igimgs = n ? `<div class="igimgs">${images.map(u => `<img src="${u}">`).join("")}</div>` : "";
    return `<div class="embed block instagram" contenteditable="false">
      <div class="ighead"><div class="av"${avStyle}></div><div class="uname">${escapeHtml(uname)}</div></div>
      ${igimgs}
      <div class="igfoot">
        <svg viewBox="0 0 24 24"><path d="M20.8 8.6c0-3-2.2-5.1-5-5.1-1.9 0-3.3 1-4.3 2.5C10.5 4.5 9.1 3.5 7.2 3.5c-2.8 0-5 2.1-5 5.1 0 4.6 5.4 8.6 9.3 11.7l.5.4.5-.4c3.9-3.1 9.3-7.1 9.3-11.7z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M3 12c0-4.4 4-8 9-8s9 3.6 9 8-4 8-9 8c-1.1 0-2.2-.2-3.2-.5L4 21l1.4-4.4C4.1 15.3 3 13.7 3 12z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4z"/></svg>
      </div>
      <div class="igbody"><div class="igtext">${textHtml ? `<b>${escapeHtml(uname)}</b>${textHtml}` : ""}</div></div>
      <button class="embed-del">×</button>
    </div>`;
  }
  if (type === "twitter") {
    const dispName = character?.name || "user";
    const handle = character?.twitter || "@user";
    return `<div class="embed block twitter" contenteditable="false">
      <div class="av"${avStyle}></div>
      <div class="twbody">
        <div class="twhead"><b>${escapeHtml(dispName)}</b><span>${escapeHtml(handle)}</span></div>
        <div class="twtext">${textHtml}</div>
        ${imgsHtml}
      </div>
      <button class="embed-del">×</button>
    </div>`;
  }
  const pos = position === "right" ? "right" : "left";
  const name = character?.name || "";
  return `<div class="embed block ${type}" contenteditable="false">
    <div class="bubblerow ${pos}">
      <div class="bubblecol">
        ${name && pos === "left" ? `<div class="b-name">${escapeHtml(name)}</div>` : ""}
        <div class="bubble">${textHtml}${imgsHtml}</div>
      </div>
    </div>
    <button class="embed-del">×</button>
  </div>`;
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function formatText(s) {
  const esc = escapeHtml(s).replace(/\n/g, "<br>");
  return esc.replace(/(^|\s)(#[^\s#<]+)/g, (m, p1, p2) => p1 + '<span class="hashtag">' + p2 + '</span>');
}
